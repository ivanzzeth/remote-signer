# Build and publish multi-platform artefacts on tag push:
#   - remote-signer Go binaries (linux/darwin × amd64/arm64) with UI embedded
#   - Chrome extension zip
#   - Desktop installers (macOS dmg arm64+x64, Windows nsis x64, Linux AppImage x64)
#
# All artefacts attach to the same GitHub Release for the pushed tag.
# softprops/action-gh-release appends when called more than once with the
# same tag_name, so the desktop matrix jobs run alongside the main `release`
# job and contribute their installers as additional release assets.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  # docker-publish job pushes to ghcr.io with GITHUB_TOKEN; needs
  # explicit packages:write since the default workflow token grants
  # only contents:write.
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # The web workspace and the extension both consume the SDK via
      # `file:../pkg/js-client`, which needs its dist/ to exist before
      # either `npm ci` resolves. Mirrors the step in ci.yml.
      - name: Build SDK
        run: |
          cd pkg/js-client
          npm ci --no-audit --no-fund
          npm run build

      - name: Build web UI bundle (vite → internal/web/dist)
        # Release binaries embed the React SPA via the embed_web build tag
        # below. The dist directory is gitignored, so it has to be produced
        # fresh in CI before any go build.
        run: |
          cd web
          npm ci --no-audit --no-fund
          npm run build

      - name: Build remote-signer (multi-arch, UI embedded)
        # Inject the bare tag (no leading 'v') into internal/version.Version
        # via -X ldflag, so `remote-signer version` matches the GitHub
        # release for each downloaded binary. See GIT.md for the
        # release-versioning convention.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building remote-signer version $VERSION"
          for goos in linux darwin; do
            for goarch in amd64 arm64; do
              GOOS=$goos GOARCH=$goarch CGO_ENABLED=0 go build \
                -tags embed_web \
                -ldflags="-s -w -X github.com/ivanzzeth/remote-signer/internal/version.Version=$VERSION" \
                -o "remote-signer-${goos}-${goarch}" \
                ./cmd/remote-signer
            done
          done

      - name: Build and package Chrome extension
        run: |
          cd extension
          npm ci --no-audit --no-fund
          node build.mjs
          mkdir -p dist
          zip -r dist/remote-signer-extension.zip \
            manifest.json background.js inpage.js content-script.js \
            rules.json popup/ -x "*.map"

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            remote-signer-*
            extension/dist/remote-signer-extension.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish remote-signer-client to npm with the tagged version. Decoupled
  # from the desktop matrix so an OS-runner outage doesn't block SDK
  # publishing; runs in parallel with `desktop`. Requires NPM_TOKEN repo
  # secret — a Granular Access Token scoped to remote-signer-client only,
  # read + write, bypass-2FA enabled. See GIT.md "Adding NPM_TOKEN secret".
  sdk-publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # Configure npm to pull auth from NPM_TOKEN env var below.
          registry-url: 'https://registry.npmjs.org/'

      - name: Sync package version with release tag
        # `npm version` requires bare semver — strip the leading 'v' from
        # the git tag. `--allow-same-version` lets us replay a release
        # without churn when the source already matches.
        working-directory: pkg/js-client
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting remote-signer-client version to $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install + build
        working-directory: pkg/js-client
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Publish to npm
        working-directory: pkg/js-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  desktop:
    # Each platform builds its own desktop installer. electron-builder
    # cannot cross-compile dmg/exe/AppImage in any reliable way, so the
    # matrix dispatches to a real runner of the target OS. macOS gets two
    # runners (one per arch) since the Go binary baked into the dmg has to
    # match the dmg's arch — building one runner with `lipo`-stitched
    # universal binary is cleaner long-term but adds a step we don't need
    # for the first release.
    #
    # `needs: release` waits for the main release job to create the Release
    # object first; the matrix steps then append their installers to it.
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
            goos: darwin
            goarch: arm64
            target_args: --mac dmg --arm64
            asset_glob: electron/out/*.dmg
          - os: ubuntu-latest
            arch: x64
            goos: linux
            goarch: amd64
            target_args: --linux AppImage --x64
            asset_glob: electron/out/*.AppImage
          - os: windows-latest
            arch: x64
            goos: windows
            goarch: amd64
            target_args: --win nsis --x64
            asset_glob: electron/out/*.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # Windows-latest defaults to PowerShell; force bash so the inline
        # GOOS=... go build syntax (and the same logic in all matrix legs)
        # works uniformly.
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build SDK
        run: |
          cd pkg/js-client
          npm ci --no-audit --no-fund
          npm run build

      - name: Build web UI bundle
        run: |
          cd web
          npm ci --no-audit --no-fund
          npm run build

      - name: Build remote-signer Go binary for this platform
        # electron/package.json's extraResources.from points at
        # ./remote-signer at repo root. electron-builder will copy that
        # exact file into the app bundle's bin/ folder, so we must place
        # the right arch's binary there before packaging. The Go binary
        # filename is the same regardless of GOOS — electron-builder also
        # handles the Windows .exe rename on Windows runs via the
        # extraResources `filter`.
        #
        # Same version-injection convention as the main release job —
        # the daemon shipped inside the installer reports the release
        # tag from `remote-signer version`.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build \
            -tags embed_web \
            -ldflags="-s -w -X github.com/ivanzzeth/remote-signer/internal/version.Version=$VERSION" \
            -o remote-signer${{ matrix.goos == 'windows' && '.exe' || '' }} \
            ./cmd/remote-signer

      - name: Compile electron main + package installer
        # `npm run build` inside electron/ is the tsc compile; we run it
        # explicitly then drive electron-builder directly so the per-matrix
        # target/arch flags override the defaults baked into package.json.
        # `--publish never` tells electron-builder not to attempt its own
        # upload — the action-gh-release step below owns that.
        #
        # Before packaging, sync package.json's "version" field from the
        # release tag (stripped of leading 'v'). electron-builder reads
        # this for the installer filename (Remote.Signer-${version}-…),
        # so without this step the installer ships with the dev sentinel
        # baked into source and the artefact name doesn't match the tag.
        working-directory: electron
        run: |
          npm ci --no-audit --no-fund
          TAG="${GITHUB_REF_NAME#v}"
          echo "Setting electron app version to $TAG"
          npm version "$TAG" --no-git-tag-version --allow-same-version
          npm run build
          npx electron-builder ${{ matrix.target_args }} --publish never

      - name: Upload desktop installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Multi-arch Docker image push to ghcr. Independent of the desktop
  # matrix and sdk-publish jobs — runs in parallel after the main
  # release job creates the GitHub Release object. Uses buildx + qemu
  # so linux/arm64 cross-builds work from the ubuntu-latest runner.
  #
  # Auth is the workflow's built-in GITHUB_TOKEN (no extra secret
  # required); needs packages:write at the workflow level above.
  # Resulting image lives at:
  #
  #   ghcr.io/ivanzzeth/remote-signer:<tag>
  #   ghcr.io/ivanzzeth/remote-signer:<major>.<minor>
  #   ghcr.io/ivanzzeth/remote-signer:latest
  #
  # The package starts private. To let `docker pull` work without
  # auth, flip it to public once on
  # github.com/users/ivanzzeth/packages/container/remote-signer/settings.
  docker-publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive VERSION (strip leading v)
        # Mirror the convention used by the Go ldflag inject and the
        # SDK npm version step — bare semver, no leading 'v'.
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Derive image tags
        # metadata-action produces the list of tags from the git ref.
        # type=semver,pattern=… extracts components from semver tags.
        # type=raw,value=latest pins the floating tag to the latest
        # release; only emitted for non-prerelease tags.
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/remote-signer
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Same VERSION convention as the Go ldflag + npm version
          # paths — bare semver, derived above.
          build-args: |
            VERSION=${{ env.VERSION }}
