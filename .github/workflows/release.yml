# Build and publish the unified remote-signer binary on tag push.
# Requires repo to be public for setup.sh to download without auth.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build remote-signer (multi-arch)
        run: |
          for goos in linux darwin; do
            for goarch in amd64 arm64; do
              GOOS=$goos GOARCH=$goarch CGO_ENABLED=0 go build \
                -ldflags="-s -w" \
                -o "remote-signer-${goos}-${goarch}" \
                ./cmd/remote-signer
            done
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and package Chrome extension
        run: |
          cd extension
          npm ci --no-audit --no-fund
          node build.mjs
          mkdir -p dist
          zip -r dist/remote-signer-extension.zip \
            manifest.json background.js inpage.js content-script.js \
            rules.json popup/ -x "*.map"

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            remote-signer-*
            extension/dist/remote-signer-extension.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
