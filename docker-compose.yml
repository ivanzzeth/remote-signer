services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: remote-signer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signer_password}
      POSTGRES_DB: ${POSTGRES_DB:-remote_signer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signer} -d ${POSTGRES_DB:-remote_signer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signer-network

  # ==========================================================================
  # Remote Signer Service
  # ==========================================================================
  remote-signer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: remote-signer
    restart: unless-stopped
    # Host network mode: shares host's network stack directly.
    # This allows IP whitelist to see real client IPs (Docker bridge NAT
    # would otherwise rewrite all source IPs to the gateway address).
    network_mode: host
    # Enable interactive mode for secure password input at startup
    # Use: docker-compose run --rm remote-signer
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
    # Security: Resource limits to prevent DoS attacks from Solidity rule execution
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    # Security: Disable swap to prevent private keys from being written to disk.
    # memswap_limit = memory limit means total (RAM + swap) = RAM, so swap quota = 0.
    # Even if the host has swap enabled, this container cannot use it.
    memswap_limit: 4G
    mem_swappiness: 0
    # Security: Prevent privilege escalation
    security_opt:
      - no-new-privileges:true
    # Security: Drop all capabilities except what's needed
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      # IPC_LOCK: allows mlockall() to lock all memory pages in RAM,
      # preventing private keys from being paged to disk under any circumstance.
      - IPC_LOCK
    # Raise memlock ulimit so mlockall() can lock the full memory allocation.
    # Docker defaults to 64KB which is far too small; -1 means unlimited.
    ulimits:
      memlock:
        soft: -1
        hard: -1
    environment:
      # Database connection (host network: connect via localhost, port exposed by postgres container)
      DATABASE_DSN: "postgres://${POSTGRES_USER:-signer}:${POSTGRES_PASSWORD:-signer_password}@127.0.0.1:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-remote_signer}?sslmode=disable"
      # Optional: additional signers
      # EVM_SIGNER_KEY_1: ${EVM_SIGNER_KEY_1}
      # EVM_SIGNER_KEY_2: ${EVM_SIGNER_KEY_2}
      # Notification tokens (optional)
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      PUSHOVER_APP_TOKEN: ${PUSHOVER_APP_TOKEN:-}
    volumes:
      # Configuration file
      - ./config.yaml:/app/configs/config.yaml:ro
      # Rules directory (for file-based rules)
      - ./rules:/app/configs/rules:ro
      # TLS certificates (generated via ./scripts/gen-certs.sh)
      - ./certs:/app/certs:ro
      # Keystores - mounted to match project structure
      - ./data/keystores:/app/data/keystores:ro
      # HD wallets - read-write for API-created wallets
      - ./data/hd-wallets:/app/data/hd-wallets
      # Foundry binaries (downloaded to host via deploy.sh init)
      - ./data/foundry/forge:/usr/local/bin/forge:ro
      - ./data/foundry/cast:/usr/local/bin/cast:ro
      # Forge workspace with lib/forge-std (install on host via deploy.sh init; no download in container)
      - ./data/forge-workspace:/app/data/forge-workspace
      # Forge cache: bind mount so local and Docker share the same cache (no cold cache in container)
      - ./data/forge-cache:/app/data/forge-cache
    # No "ports:" needed — host network mode binds directly to host's port 8548
    # Healthcheck: auto-detect TLS by checking if server cert exists
    # If certs are mounted (TLS enabled): use HTTPS with client cert (mTLS)
    # Otherwise: use plain HTTP
    healthcheck:
      test: ["CMD-SHELL", "if [ -f /app/certs/server.crt ]; then wget -qO /dev/null --no-check-certificate --certificate=/app/certs/client.crt --private-key=/app/certs/client.key https://localhost:8548/health; else wget -qO /dev/null http://localhost:8548/health; fi"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  signer-network:
    driver: bridge
