services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: remote-signer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signer_password}
      POSTGRES_DB: ${POSTGRES_DB:-remote_signer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-25432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signer} -d ${POSTGRES_DB:-remote_signer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signer-network

  # ==========================================================================
  # Remote Signer Service
  # ==========================================================================
  remote-signer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: remote-signer
    restart: unless-stopped
    # Host network mode: shares host's network stack directly.
    # This allows IP whitelist to see real client IPs (Docker bridge NAT
    # would otherwise rewrite all source IPs to the gateway address).
    network_mode: host
    # Enable interactive mode for secure password input at startup
    # Use: docker-compose run --rm remote-signer
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
    # Security: Resource limits to prevent DoS attacks from Solidity rule execution.
    # CPU limit must not exceed host CPU count (e.g. 2.00 on a 2-CPU machine). Override with COMPOSE_CPUS_LIMIT if needed.
    deploy:
      resources:
        limits:
          cpus: '${COMPOSE_CPUS_LIMIT:-2}'
          memory: ${COMPOSE_MEMORY_LIMIT:-4G}
        reservations:
          cpus: '${COMPOSE_CPUS_RESERVE:-0.5}'
          memory: ${COMPOSE_MEMORY_RESERVE:-512M}
    # Security: Disable swap to prevent private keys from being written to disk.
    # memswap_limit = memory limit means total (RAM + swap) = RAM, so swap quota = 0.
    memswap_limit: ${COMPOSE_MEMORY_LIMIT:-4G}
    mem_swappiness: 0
    # Security: Read-only root filesystem (volumes/tmpfs override where writes are needed)
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
      - /run:noexec,nosuid,size=64m
    # Security: Prevent privilege escalation
    security_opt:
      - no-new-privileges:true
      - seccomp=deploy/seccomp.json
    # Security: Drop all capabilities except what's needed
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      # IPC_LOCK: allows mlockall() to lock all memory pages in RAM,
      # preventing private keys from being paged to disk under any circumstance.
      - IPC_LOCK
    # Raise memlock ulimit so mlockall() can lock the full memory allocation.
    # Docker defaults to 64KB which is far too small; -1 means unlimited.
    ulimits:
      memlock:
        soft: -1
        hard: -1
    environment:
      # PATH: /app/data/foundry first so forge/cast match repo layout (./data/foundry/)
      PATH: "/app/data/foundry:/usr/local/bin:/usr/bin:/bin"
      # Database connection (host network: connect via localhost, port exposed by postgres container)
      DATABASE_DSN: "postgres://${POSTGRES_USER:-signer}:${POSTGRES_PASSWORD:-signer_password}@127.0.0.1:${POSTGRES_PORT:-25432}/${POSTGRES_DB:-remote_signer}?sslmode=disable"
      # Optional: additional signers
      # EVM_SIGNER_KEY_1: ${EVM_SIGNER_KEY_1}
      # EVM_SIGNER_KEY_2: ${EVM_SIGNER_KEY_2}
      # Notification tokens (optional)
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      PUSHOVER_APP_TOKEN: ${PUSHOVER_APP_TOKEN:-}
      # Proxy settings (needed for Telegram/external API access in some networks)
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,host.docker.internal}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["/app/remote-signer", "-config", "/app/config.yaml"]
    volumes:
      # Mirror repo layout: /app = project root, paths identical to repo
      - ./config.yaml:/app/config.yaml:ro
      # rules (and optional rules/presets for preset API when presets.dir is set in config)
      - ./rules:/app/rules:ro
      - ./certs:/app/certs:ro
      - ./data/keystores:/app/data/keystores
      - ./data/hd-wallets:/app/data/hd-wallets
      - ./data/foundry:/app/data/foundry:ro
      - ./data/forge-workspace:/app/data/forge-workspace
      - ./data/forge-cache:/app/data/forge-cache
      - ./data/anvil-cache:/app/data/anvil-cache
      # Solc compiler cache: forge auto-downloads solc by pragma version (bind mount so signer can write)
      - ./data/svm:/home/signer/.svm
    # No "ports:" needed — host network mode binds directly to host's port 8548
    # Healthcheck: auto-detect TLS by checking if server cert exists
    # If certs are mounted (TLS enabled): use HTTPS with client cert (mTLS)
    # Otherwise: use plain HTTP
    healthcheck:
      test: ["CMD-SHELL", "if [ -f /app/certs/server.crt ]; then wget --no-hsts -qO /dev/null --no-check-certificate --certificate=/app/certs/client.crt --private-key=/app/certs/client.key https://localhost:8548/health; else wget --no-hsts -qO /dev/null http://localhost:8548/health; fi"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  signer-network:
    driver: bridge
