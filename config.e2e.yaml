# E2E Test Configuration
# This configuration is used exclusively for e2e tests
# It uses in-memory database and test-specific settings

server:
  host: "127.0.0.1"
  port: 8548  # Can be overridden by E2E_API_PORT env var

database:
  # In-memory SQLite for e2e tests (will be overridden by test server)
  dsn: "file::memory:?cache=shared&_journal_mode=WAL&_busy_timeout=5000"

chains:
  evm:
    enabled: true
    signers:
      private_keys:
        # Test signer (Hardhat/Foundry first account)
        # Address: 0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
        - address: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          key_env: "E2E_TEST_SIGNER_KEY"  # Will be set by test server
          enabled: true
        # Second signer (Hardhat account 2) — not in any whitelist; used for approval-guard e2e
        - address: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"
          key_env: "E2E_TEST_SIGNER2_KEY"
          enabled: true
    keystore_dir: "./data/keystores-e2e"
    foundry:
      enabled: true
      forge_path: ""
      cache_dir: "./data/forge-cache-e2e"
      timeout: "30s"

notify:
  slack:
    enabled: false
  pushover:
    enabled: false

notify_channels:
  slack: []
  pushover: []

security:
  max_request_age: "60s"
  rate_limit_default: 1000
  nonce_required: true
  # E2E: enable manual approval so tests that expect "pending" (e.g. approval flow) pass
  manual_approval_enabled: true
  approval_guard:
    enabled: true
    window: "2m"
    threshold: 3
    resume_after: "15s"
  ip_whitelist:
    enabled: false
    allowed_ips: []
    trust_proxy: false

logger:
  level: "warn"  # Reduce noise in tests
  pretty: false

# API Keys - will be dynamically created by test server
# These are placeholders, actual keys are generated at runtime
api_keys: []

# Templates (file-type): loaded at startup, used to expand instance rules
# Used by TestTemplate_ConfigLoadedTemplatesAndInstanceRules and delegation/evm_js e2e
templates:
  - name: "E2E Minimal Template"
    type: "file"
    enabled: true
    config:
      path: "e2e/fixtures/minimal_template.yaml"
  - name: "E2E Safe Template"
    type: "file"
    enabled: true
    config:
      path: "rules/templates/safe.template.js.yaml"
  - name: "E2E Multisend Template"
    type: "file"
    enabled: true
    config:
      path: "rules/templates/multisend.template.js.yaml"
  - name: "E2E ERC20 Template"
    type: "file"
    enabled: true
    config:
      path: "rules/templates/erc20.template.js.yaml"
  - name: "E2E ERC721 Template"
    type: "file"
    enabled: true
    config:
      path: "rules/templates/erc721.template.js.yaml"
  - name: "E2E Polymarket Template"
    type: "file"
    enabled: true
    config:
      path: "rules/templates/polymarket.template.js.yaml"

# Rules for e2e testing
# Rules can be defined here (config source) or via API (api source)
# Rule evaluation: blocklist rules checked first, then whitelist rules
# Mode: "whitelist" = any match allows, "blocklist" = any match blocks
rules:
  # Example 1: Address whitelist - allow transactions to treasury address
  # Used by TestRule_TransactionToTreasuryPasses
  - name: "Allow transfers to treasury"
    type: "evm_address_whitelist"
    mode: "whitelist"
    enabled: true
    config:
      addresses:
        - "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4"  # Treasury address

  # Example 2: Blocklist rule - block transactions to burn address
  # Used by TestRule_TransactionToBurnAddressBlocked
  - name: "Block known malicious addresses"
    type: "evm_solidity_expression"
    mode: "blocklist"
    enabled: true
    config:
      expression: |
        require(to != 0x000000000000000000000000000000000000dEaD, "blocked: burn address");
      description: "Block transfers to burn address for e2e testing"
      test_cases:
        - name: "should pass for normal address"
          input:
            to: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4"
          expect_pass: true
        - name: "should block burn address"
          input:
            to: "0x000000000000000000000000000000000000dEaD"
          expect_pass: false
          expect_reason: "blocked: burn address"

  # Example 3: Value limit rule - block high-value transactions (scoped to first signer so
  # second signer + tx to non-listed address is rejected; TestRule_AddressWhitelist_RejectsNonListedAddress)
  # Can be tested via API: TestRule_ValueLimitRuleBlocks
  - name: "Max 10 ETH per transaction"
    type: "evm_value_limit"
    mode: "whitelist"
    signer_address: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
    enabled: true
    config:
      max_value: "10000000000000000000"  # 10 ETH in wei

  # Example 4: Signer restriction - auto-approve requests from test signer
  # Used by TestRule_SignerRestrictionAllowsTestSigner
  - name: "Allow hot wallet signer"
    type: "signer_restriction"
    mode: "whitelist"
    enabled: true
    config:
      allowed_signers:
        - "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"  # Test signer address

  # Example 5: Sign type restriction - allow specific signing methods (scoped to first signer only
  # so that second signer is not allowed by this rule; enables TestRule_SignerRestriction_BlocksSignerNotInAllowList)
  # Used by TestRule_SignTypeRestrictionAllowsTransaction, TestRule_SignTypeRestrictionAllowsPersonalSign
  - name: "Allow common signing methods"
    type: "sign_type_restriction"
    mode: "whitelist"
    enabled: true
    signer_address: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"  # First test signer only
    config:
      allowed_sign_types:
        - "personal"     # Personal message signing
        - "typed_data"   # EIP-712 structured data signing
        - "transaction"  # Transaction signing
        - "hash"         # Hash signing
        - "raw_message"  # Raw message signing
        - "eip191"       # EIP-191 signing

  # Example 6: Instance rule — expanded from E2E Minimal Template at startup
  # Used by TestTemplate_ConfigLoadedTemplatesAndInstanceRules
  - name: "Instance of E2E Minimal"
    type: "instance"
    enabled: true
    config:
      template: "E2E Minimal Template"
      variables:
        allowed_address: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4"

  # evm_js template instances (Safe, Multisend, ERC20, ERC721); delegation: Safe => Multisend => (ERC20 | ERC721) per item
  # id = stable rule ID (optional); use in delegate_to for maintainability. List: validate-rules -config config.e2e.yaml -list-rule-ids
  - name: "E2E Safe instance"
    type: "instance"
    chain_type: "evm"
    chain_id: "1"
    enabled: true
    config:
      template: "E2E Safe Template"
      id: "e2e-safe"
      variables:
        chain_id: "1"
        allowed_safe_addresses: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4"
        allowed_safe_tx_to_addresses: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4,0xA238CBeb142c10Ef7Ad8442C6D1f9E89e07e7761"
        delegate_to: "e2e-multisend"
        delegate_mode: "single"

  - name: "E2E Multisend instance"
    type: "instance"
    chain_type: "evm"
    chain_id: "1"
    enabled: true
    config:
      template: "E2E Multisend Template"
      id: "e2e-multisend"
      variables:
        chain_id: "1"
        multisend_contract_address: "0xA238CBeb142c10Ef7Ad8442C6D1f9E89e07e7761"
        delegate_to: "e2e-erc20,e2e-erc721"
        delegate_mode: "per_item"

  - name: "E2E ERC20 instance"
    type: "instance"
    chain_type: "evm"
    chain_id: "1"
    enabled: true
    config:
      template: "E2E ERC20 Template"
      id: "e2e-erc20"
      variables:
        chain_id: "1"
        token_address: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
        max_transfer_amount: "1000000000"

  - name: "E2E ERC721 instance"
    type: "instance"
    chain_type: "evm"
    chain_id: "1"
    enabled: true
    config:
      template: "E2E ERC721 Template"
      id: "e2e-erc721"
      variables:
        chain_id: "1"
        token_address: "0xBC4ca0EdA7647A8aB7C2061c2E118A18a936f13D"
        allowed_recipients: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4"

  # Polymarket JS + Safe JS combined: Polymarket instance (ClobAuth, Order, CreateProxy, Safe Wallet Creation, e2e-polymarket-inner)
  # must be listed before E2E Safe Polymarket so rule id "e2e-polymarket-inner" exists for delegate_to.
  - name: "E2E Polymarket instance"
    type: "instance"
    chain_type: "evm"
    chain_id: "137"
    enabled: true
    config:
      template: "E2E Polymarket Template"
      variables:
        chain_id: "137"
        ctf_exchange_address: "0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E"
        neg_risk_adapter_address: "0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296"
        neg_risk_exchange_address: "0xC5d563A36AE78145C45a50134d48A1215220f80a"
        conditional_tokens_address: "0x4D97DCd97eC945f40cF65F87097ACe5EA0476045"
        safe_proxy_factory_address: "0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b"
        usdc_bridged_address: "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"
        allowed_safe_address_for_testing: "0xaC52BebecA7f5FA1561fa9Ab8DA136602D21b837"
        allowed_safe_addresses: "0xaC52BebecA7f5FA1561fa9Ab8DA136602D21b837"
        clob_auth_domain_name: "ClobAuthDomain"
        clob_auth_domain_version: "1"
        ctf_exchange_domain_name: "Polymarket CTF Exchange"
        ctf_exchange_domain_version: "1"
        safe_factory_domain_name: "Polymarket Contract Proxy Factory"

  # Safe template instance for Polymarket: delegates inner calls to e2e-polymarket-inner (same effect as polymarket.safe.template.yaml).
  - name: "E2E Safe Polymarket instance"
    type: "instance"
    chain_type: "evm"
    chain_id: "137"
    enabled: true
    config:
      template: "E2E Safe Template"
      id: "e2e-safe-polymarket"
      variables:
        chain_id: "137"
        allowed_safe_addresses: "0xaC52BebecA7f5FA1561fa9Ab8DA136602D21b837"
        allowed_safe_tx_to_addresses: "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174,0x4D97DCd97eC945f40cF65F87097ACe5EA0476045,0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296,0xC5d563A36AE78145C45a50134d48A1215220f80a"
        delegate_to: "e2e-polymarket-inner"
        delegate_mode: "single"

  # Delegation: evm_js delegate_to target; TestRule_DelegationSinglePasses.
  # Scoped to first signer only so second signer is not allowed by this rule (signer_restriction negative e2e).
  - id: "e2e-delegate-target"
    name: "E2E Delegate Target"
    type: "evm_js"
    mode: "whitelist"
    chain_type: "evm"
    chain_id: "1"
    signer_address: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
    enabled: true
    config:
      script: |
        function validate(i){ return { valid: true }; }

  # Scoped to first signer so second signer is not allowed (address whitelist + signer restriction e2e).
  - id: "e2e-delegate-single"
    name: "E2E Delegate Single"
    type: "evm_js"
    mode: "whitelist"
    chain_type: "evm"
    chain_id: "1"
    signer_address: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
    enabled: true
    config:
      script: |
        function validate(i){
          return {
            valid: true,
            payload: {
              sign_type: "transaction",
              chain_id: 1,
              signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266",
              transaction: { from: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266", to: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4", value: "0x0", data: "0x" }
            }
          };
        }
      delegate_to: "e2e-delegate-target"
      delegate_mode: "single"
