  # Delegation: evm_js delegate_to target; TestRule_DelegationSinglePasses.
  # Scoped to first signer only so second signer is not allowed by this rule (signer_restriction negative e2e).
  # test_cases required for validate-rules and startup validation (at least 1 positive + 1 negative).
  - id: "e2e-delegate-target"
    name: "E2E Delegate Target"
    type: "evm_js"
    mode: "whitelist"
    chain_type: "evm"
    chain_id: "1"
    signer_address: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
    enabled: true
    config:
      # Only match personal_sign and the exact delegation payload (transaction to treasury with data 0x). Avoid matching other typed_data/transaction so other rules' negative cases are not allowed by this rule.
      sign_type_filter: "personal_sign,transaction"
      script: |
        function validate(i) {
          if (i.sign_type === 'personal_sign') return { valid: true };
          if (i.sign_type === 'transaction' && i.transaction && i.transaction.to === '0x5B38Da6a701c568545dCfcB03FcB875f56beddC4' && (i.transaction.data || '0x') === '0x') return { valid: true };
          return { valid: false, reason: 'e2e delegate target only allows personal_sign or delegated tx to treasury' };
        }
    test_cases:
      - name: "allow when in scope (positive)"
        input:
          sign_type: "personal_sign"
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          chain_id: 1
          personal_sign:
            message: "0x68656c6c6f"
        expect_pass: true
      - name: "reject when signer not in scope (negative)"
        input:
          sign_type: "personal_sign"
          signer: "0x0000000000000000000000000000000000000001"
          chain_id: 1
          personal_sign:
            message: "0x00"
        expect_pass: false

  # Scoped to first signer so second signer is not allowed (address whitelist + signer restriction e2e).
  # test_cases required for validate-rules and startup validation (at least 1 positive + 1 negative).
  - id: "e2e-delegate-single"
    name: "E2E Delegate Single"
    type: "evm_js"
    mode: "whitelist"
    chain_type: "evm"
    chain_id: "1"
    signer_address: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
    enabled: true
    config:
      sign_type_filter: "transaction,personal_sign"
      script: |
        function validate(i){
          if (i.sign_type !== 'transaction' || !i.transaction) return { valid: false, reason: 'transaction only' };
          var tx = i.transaction;
          var to = (tx.to || '').toLowerCase();
          if (to !== '0x5b38da6a701c568545dcfcb03fcb875f56beddc4') return { valid: false, reason: 'e2e delegate single only allows tx to treasury' };
          if ((tx.data || '0x').toLowerCase() !== '0x') return { valid: false, reason: 'e2e delegate single only allows empty data' };
          return {
            valid: true,
            payload: {
              sign_type: "transaction",
              chain_id: 1,
              signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266",
              transaction: { from: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266", to: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4", value: "0x0", data: "0x" }
            }
          };
        }
      delegate_to: "e2e-delegate-target"
      delegate_mode: "single"
    test_cases:
      - name: "delegate single allows transaction and delegates (positive)"
        input:
          sign_type: "transaction"
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          chain_id: 1
          transaction:
            from: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
            to: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4"
            value: "0x0"
            data: "0x"
        expect_pass: true
      - name: "reject when signer not in scope (negative)"
        input:
          sign_type: "personal_sign"
          signer: "0x0000000000000000000000000000000000000001"
          chain_id: 1
          personal_sign:
            message: "0x00"
        expect_pass: false
