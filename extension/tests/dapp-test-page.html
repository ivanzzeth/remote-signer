<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Signer E2E Test dApp</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .panel { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .panel h3 { margin-top: 0; }
    pre { background: #f0f0f0; padding: 0.75rem; border-radius: 4px; overflow-x: auto; font-size: 0.85rem; }
    button { padding: 0.5rem 1rem; margin: 0.25rem; cursor: pointer; border-radius: 4px; border: 1px solid #999; background: #fff; }
    button:hover { background: #e8e8e8; }
    .status { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 4px; font-weight: 600; }
    .status.ok { background: #d4edda; color: #155724; }
    .status.err { background: #f8d7da; color: #721c24; }
    .status.pending { background: #fff3cd; color: #856404; }
    #results { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Remote Signer E2E Test dApp</h1>
  <p>This page tests the EIP-1193 provider injected by the Remote Signer extension.</p>

  <div class="panel">
    <h3>Provider State</h3>
    <p>Available: <span id="providerStatus" class="status pending">checking...</span></p>
    <p>Chain ID: <span id="chainId">-</span></p>
    <p>Accounts: <pre id="accounts">-</pre></p>
    <p>Connected: <span id="connected">-</span></p>
  </div>

  <div class="panel">
    <h3>EIP-1193 Actions</h3>
    <button id="btnRequestAccounts">eth_requestAccounts</button>
    <button id="btnAccounts">eth_accounts</button>
    <button id="btnChainId">eth_chainId</button>
    <button id="btnPersonalSign">personal_sign</button>
    <button id="btnSendTransaction">eth_sendTransaction</button>
    <button id="btnSwitchChain">wallet_switchEthereumChain</button>
    <div id="results"></div>
  </div>

  <div class="panel">
    <h3>Event Log</h3>
    <pre id="eventLog">-</pre>
  </div>

  <script>
    (function () {
      const eventLog = [];
      function logEvent(name, data) {
        const entry = new Date().toISOString() + " " + name + " " + JSON.stringify(data);
        eventLog.unshift(entry);
        const el = document.getElementById("eventLog");
        if (el) el.textContent = eventLog.slice(0, 50).join("\n");
      }

      // Poll for provider availability
      let checkCount = 0;
      var checkInterval = setInterval(function () {
        checkCount++;
        const provider = window.ethereum;
        const statusEl = document.getElementById("providerStatus");
        if (!statusEl) return;
        if (provider) {
          clearInterval(checkInterval);
          statusEl.textContent = "available";
          statusEl.className = "status ok";
          document.getElementById("chainId").textContent = provider.chainId || "-";
          document.getElementById("connected").textContent = String(provider.isConnected ? provider.isConnected() : false);

          if (provider.selectedAddress) {
            document.getElementById("accounts").textContent = JSON.stringify([provider.selectedAddress]);
          }

          provider.on("accountsChanged", function (accounts) { logEvent("accountsChanged", accounts); });
          provider.on("chainChanged", function (chainId) { logEvent("chainChanged", chainId); });
          provider.on("connect", function (info) { logEvent("connect", info); });
          provider.on("disconnect", function (error) { logEvent("disconnect", error); });
        } else if (checkCount > 100) {
          clearInterval(checkInterval);
          statusEl.textContent = "unavailable (timeout)";
          statusEl.className = "status err";
        }
      }, 100);

      function showResult(result) {
        document.getElementById("results").innerHTML = "<pre>" + JSON.stringify(result, null, 2).replace(/</g, "&lt;") + "</pre>";
      }

      document.getElementById("btnRequestAccounts").onclick = async function () {
        var r = await window.ethereum.request({ method: "eth_requestAccounts", params: [] });
        showResult(r);
      };
      document.getElementById("btnAccounts").onclick = async function () {
        var r = await window.ethereum.request({ method: "eth_accounts", params: [] });
        showResult(r);
        document.getElementById("accounts").textContent = JSON.stringify(r);
      };
      document.getElementById("btnChainId").onclick = async function () {
        var r = await window.ethereum.request({ method: "eth_chainId", params: [] });
        showResult(r);
        document.getElementById("chainId").textContent = r;
      };
      document.getElementById("btnPersonalSign").onclick = async function () {
        var accounts = await window.ethereum.request({ method: "eth_accounts", params: [] });
        if (!accounts || !accounts.length) { showResult("no accounts"); return; }
        var r = await window.ethereum.request({ method: "personal_sign", params: ["0x48656c6c6f", accounts[0]] });
        showResult(r);
      };
      document.getElementById("btnSendTransaction").onclick = async function () {
        var accounts = await window.ethereum.request({ method: "eth_accounts", params: [] });
        if (!accounts || !accounts.length) { showResult("no accounts"); return; }
        var r = await window.ethereum.request({ method: "eth_sendTransaction", params: [{
          from: accounts[0],
          to: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8",
          value: "0x0",
        }] });
        showResult(r);
      };
      document.getElementById("btnSwitchChain").onclick = async function () {
        var r = await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: "0x89" }] });
        showResult(r);
      };
    })();
  </script>
</body>
</html>
