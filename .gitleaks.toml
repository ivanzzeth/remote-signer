[extend]
# Use the default gitleaks config as base
useDefault = true

[allowlist]
# Paths that should be excluded from secret scanning
paths = [
    '''vendor/.*''',
    '''node_modules/.*''',
    '''\.git/.*''',
    '''go\.sum''',
    '''.*_test\.go''',
    '''pkg/js-client/dist/.*''',
    '''pkg/js-client/tests/.*''',
    '''\.secrets\.baseline''',
    '''rules/presets/.*''',  # preset YAML: template vars and contract addresses, not secrets
    '''rules/templates/.*''',  # template YAML: test_variables with well-known public contract addresses
    '''docs/features/.*''',  # design docs: example contract addresses, not secrets
]
