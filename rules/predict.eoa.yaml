# Predict.fun Protocol Rules (EOA Mode)
# This file contains signing rules for Predict.fun protocol on BNB Chain
#
# Protocol: Predict.fun (Prediction Market on BNB Chain)
# Chain: BNB Chain (56)
# Address: 0x53c68c954f85a29d2098e90addaf41baf2ff0a50 (EOA)
#
# Overview:
# - PersonalSign: Login authentication for Predict.fun API
# - EIP-712 Order: CTF Exchange order signing (4 Exchange contracts)
# - Direct Transactions: USDT approve, CT setApprovalForAll, CT split/merge/redeem, NegRiskAdapter operations
#
# Unlike Polymarket (Safe wallet mode), Predict uses EOA direct interaction:
# - No Safe proxy / execTransaction / SafeTx rules needed
# - Direct transaction rules validate txTo + selector + parameters
# - EIP-712 Order signed directly by EOA
# - PersonalSign for login authentication
#
# ===========================================================================
# CONTRACT ADDRESSES (BNB Chain - Chain ID: 56)
# ===========================================================================
#
# Tokens:
#   USDT:                    0x55d398326f99059fF775485246999027B3197955
#
# Non-YieldBearing (NYB) Contracts:
#   ConditionalTokens (CT):  0x22DA1810B194ca018378464a58f6Ac2B10C9d244
#   CTFExchange:             0x8BC070BEdAB741406F4B1Eb65A72bee27894B689
#   NegRiskAdapter:          0xc3Cf7c252f65E0d8D88537dF96569AE94a7F1A6E
#   NegRiskExchange:         0x365fb81bd4A24D6303cd2F19c349dE6894D8d58A
#
# YieldBearing (YB) Contracts:
#   YB ConditionalTokens:    0x9400F8Ad57e9e0F352345935d6D3175975eb1d9F
#   YB CTFExchange:          0x6bEb5a40C032AFc305961162d8204CDA16DECFa5
#   YB NegRiskAdapter:       0x41dCe1A4B8FB5e6327701750aF6231B7CD0B2A40
#   YB NegRiskExchange:      0x8A289d458f5a134bA40015085A8F50Ffb681B41d
#
# EIP-712 Domains:
#   CTF Exchange Domain:     "predict.fun CTF Exchange" (version: "1", chainId: 56)
#
# ===========================================================================

rules:
  # ===========================================================================
  # PERSONAL SIGN RULES (Login Authentication)
  # ===========================================================================

  # Login signature for Predict.fun API authentication
  # Uses message_pattern rule type (regex matching for personal sign messages)
  # Messages come from Predict.fun API (GET /v1/auth/message), content is dynamic
  # Pattern validates that the message is non-empty and within reasonable length
  - name: "Predict Login PersonalSign"
    type: "message_pattern"
    mode: "whitelist"
    enabled: true
    description: "Allow PersonalSign login signatures for predict.fun. Messages are dynamic from API, so pattern accepts any non-empty message up to reasonable length."
    config:
      # Match any non-empty message (at least 1 character)
      # The predict.fun API generates dynamic login messages, so we allow any content
      pattern: "(?s)^.{1,1000}$"
      sign_types:
        - "personal"
        - "eip191"
      description: "Validates predict.fun login message (dynamic content, length-constrained)"
      test_cases:
        # ---------------------------------------------------------------
        # Predict.fun PersonalSign test cases
        # Source: predict.fun API (GET /v1/auth/message) generates dynamic
        #   login messages. No real captured message available — messages
        #   are ephemeral and vary per session.
        #   Signer: 0x53c68c954f85a29d2098e90addaf41baf2ff0a50 (EOA)
        #   Chain: BSC (Chain ID: 56)
        # Note: PersonalSign is off-chain (no txHash) — this is a signing
        #   request, not an on-chain transaction. The pattern validates
        #   message length only (1-1000 chars) since content is dynamic.
        # ---------------------------------------------------------------
        - name: "should match normal login message (simulated predict.fun API response)"
          input:
            raw_message: "Sign in to predict.fun\nTimestamp: 1704067200\nNonce: abc123"
          expect_pass: true
        - name: "should match short message"
          input:
            raw_message: "OK"
          expect_pass: true
        - name: "should reject empty message"
          input:
            raw_message: ""
          expect_pass: false

  # ===========================================================================
  # EIP-712 ORDER SIGNING RULES (CTF Exchange)
  # ===========================================================================

  # Order signing for Predict.fun CTF Exchange (4 Exchange contracts)
  - name: "Predict Order Signature"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "56"
    description: "Validate Predict.fun CTF Exchange order signatures. Supports 4 Exchange contracts (NYB CTFExchange, NYB NegRiskExchange, YB CTFExchange, YB NegRiskExchange)."
    config:
      typed_data_struct: |
        struct Order {
            uint256 salt;
            address maker;
            address signer;
            address taker;
            uint256 tokenId;
            uint256 makerAmount;
            uint256 takerAmount;
            uint256 expiration;
            uint256 nonce;
            uint256 feeRateBps;
            uint8 side;
            uint8 signatureType;
        }
      typed_data_expression: |
        // Domain validation for Predict.fun CTF Exchange
        require(
          keccak256(bytes(eip712_domainName)) == keccak256(bytes("predict.fun CTF Exchange")),
          "invalid domain name"
        );
        require(
          keccak256(bytes(eip712_domainVersion)) == keccak256(bytes("1")),
          "invalid domain version"
        );
        // Chain ID validation — prevent cross-chain replay
        require(eip712_domainChainId == 56, "must be on BNB Chain");
        // verifyingContract must be one of the 4 allowed Exchange contracts
        require(
          eip712_domainContract == 0x8BC070BEdAB741406F4B1Eb65A72bee27894B689 || // CTFExchange (NYB)
          eip712_domainContract == 0x365fb81bd4A24D6303cd2F19c349dE6894D8d58A || // NegRiskExchange (NYB)
          eip712_domainContract == 0x6bEb5a40C032AFc305961162d8204CDA16DECFa5 || // YB CTFExchange
          eip712_domainContract == 0x8A289d458f5a134bA40015085A8F50Ffb681B41d,   // YB NegRiskExchange
          "invalid verifying contract"
        );

        // Order validation via struct instance
        // taker must be zero address for public orders (anyone can fill)
        require(order.taker == address(0), "taker must be zero address");

        // Signer identity validation — order.signer must match the actual signing key
        require(order.signer == ctx_signer, "order signer must match signing key");

        // Fee validation: max 10% (1000 basis points)
        require(order.feeRateBps <= 1000, "fee exceeds 10%");

        // Signature type must be EOA (0) — this address is an EOA, not a Safe
        require(order.signatureType == 0, "signatureType must be EOA");
      sign_type_filter: "typed_data"
      description: "CTF Exchange order signing with domain, fee, taker, signer, and signatureType validation"
      test_cases:
        - name: "should pass valid order on CTFExchange (NYB)"
          input:
            typed_data:
              primaryType: "Order"
              domain:
                name: "predict.fun CTF Exchange"
                version: "1"
                chainId: "56"
                verifyingContract: "0x8BC070BEdAB741406F4B1Eb65A72bee27894B689"
              message:
                salt: "12345"
                maker: "0x53c68c954f85a29d2098e90addaf41baf2ff0a50"
                signer: "0x53c68c954f85a29d2098e90addaf41baf2ff0a50"
                taker: "0x0000000000000000000000000000000000000000"
                tokenId: "1"
                makerAmount: "1000000000000000000"
                takerAmount: "1000000000000000000"
                expiration: "1893456000"
                nonce: "0"
                feeRateBps: "100"
                side: "0"
                signatureType: "0"
            signer: "0x53c68c954f85a29d2098e90addaf41baf2ff0a50"
          expect_pass: true
        - name: "should pass valid order on NegRiskExchange (NYB)"
          input:
            typed_data:
              primaryType: "Order"
              domain:
                name: "predict.fun CTF Exchange"
                version: "1"
                chainId: "56"
                verifyingContract: "0x365fb81bd4A24D6303cd2F19c349dE6894D8d58A"
              message:
                salt: "67890"
                maker: "0x53c68c954f85a29d2098e90addaf41baf2ff0a50"
                signer: "0x53c68c954f85a29d2098e90addaf41baf2ff0a50"
                taker: "0x0000000000000000000000000000000000000000"
                tokenId: "2"
                makerAmount: "5000000000000000000"
                takerAmount: "5000000000000000000"
                expiration: "1893456000"
                nonce: "1"
                feeRateBps: "200"
                side: "1"
                signatureType: "0"
            signer: "0x53c68c954f85a29d2098e90addaf41baf2ff0a50"
          expect_pass: true
        - name: "should pass valid order on YB CTFExchange"
          input:
            typed_data:
              primaryType: "Order"
              domain:
                name: "predict.fun CTF Exchange"
                version: "1"
                chainId: "56"
                verifyingContract: "0x6bEb5a40C032AFc305961162d8204CDA16DECFa5"
              message:
                salt: "11111"
                maker: "0x53c68c954f85a29d2098e90addaf41baf2ff0a50"
