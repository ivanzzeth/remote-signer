  # ===========================================================================
  # ETHEREUM TRANSACTION RULES - DIRECT EOA TRANSACTIONS
  # ===========================================================================

  # USDT approve — allow approving 8 protocol contracts
  - name: "Predict USDT Approve"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "56"
    description: "Allow USDT approve to 8 whitelisted protocol contracts (4 NYB + 4 YB)"
    config:
      functions: |
        function approve(address spender, uint256 amount) external {
            // txTo must be USDT on BNB Chain
            require(txTo == 0x55d398326f99059fF775485246999027B3197955, "target must be USDT");
            // spender must be one of the 8 allowed protocol contracts
            require(
                spender == 0x22DA1810B194ca018378464a58f6Ac2B10C9d244 || // CT (NYB)
                spender == 0x8BC070BEdAB741406F4B1Eb65A72bee27894B689 || // CTFExchange (NYB)
                spender == 0x365fb81bd4A24D6303cd2F19c349dE6894D8d58A || // NegRiskExchange (NYB)
                spender == 0xc3Cf7c252f65E0d8D88537dF96569AE94a7F1A6E || // NegRiskAdapter (NYB)
                spender == 0x9400F8Ad57e9e0F352345935d6D3175975eb1d9F || // YB CT
                spender == 0x6bEb5a40C032AFc305961162d8204CDA16DECFa5 || // YB CTFExchange
                spender == 0x8A289d458f5a134bA40015085A8F50Ffb681B41d || // YB NegRiskExchange
                spender == 0x41dCe1A4B8FB5e6327701750aF6231B7CD0B2A40,   // YB NegRiskAdapter
                "spender must be allowed protocol contract"
            );
        }
      description: "USDT approve with spender whitelist (8 protocol contracts)"
      test_cases:
