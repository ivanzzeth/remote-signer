  # CT setApprovalForAll — allow approving 6 operator contracts on 2 CT contracts
  - name: "Predict CT SetApprovalForAll"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "56"
    description: "Allow setApprovalForAll on ConditionalTokens (NYB + YB) to 6 whitelisted operator contracts"
    config:
      functions: |
        function setApprovalForAll(address operator, bool approved) external {
            // txTo must be one of the ConditionalTokens contracts:
            //   - CT (NYB):             0x22DA...  (also used as NYB NegRiskCTF — same address)
            //   - YB CT:                0x9400...
            //   - YB NegRiskCTF:        0xF64b...  (separate contract for YB NegRisk markets)
            require(
                txTo == 0x22DA1810B194ca018378464a58f6Ac2B10C9d244 || // CT (NYB) / NYB NegRiskCTF
                txTo == 0x9400F8Ad57e9e0F352345935d6D3175975eb1d9F || // YB CT
                txTo == 0xF64b0b318AAf83BD9071110af24D24445719A07F,   // YB NegRiskCTF
                "target must be ConditionalTokens"
            );
            // operator must be one of the 6 allowed contracts
            require(
                operator == 0x8BC070BEdAB741406F4B1Eb65A72bee27894B689 || // CTFExchange (NYB)
                operator == 0x365fb81bd4A24D6303cd2F19c349dE6894D8d58A || // NegRiskExchange (NYB)
                operator == 0xc3Cf7c252f65E0d8D88537dF96569AE94a7F1A6E || // NegRiskAdapter (NYB)
                operator == 0x6bEb5a40C032AFc305961162d8204CDA16DECFa5 || // YB CTFExchange
                operator == 0x8A289d458f5a134bA40015085A8F50Ffb681B41d || // YB NegRiskExchange
                operator == 0x41dCe1A4B8FB5e6327701750aF6231B7CD0B2A40,   // YB NegRiskAdapter
                "operator must be allowed protocol contract"
            );
            // approved must be true — only allow granting approval, not revoking
            require(approved, "approval must be true");
        }
      description: "CT setApprovalForAll with operator whitelist and approved=true"
      test_cases:
