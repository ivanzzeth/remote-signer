  # CT splitPosition / mergePositions / redeemPositions — direct calls to ConditionalTokens
  - name: "Predict CT Split Merge Redeem"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "56"
    description: "Allow splitPosition, mergePositions, redeemPositions on ConditionalTokens (NYB + YB) with collateral=USDT and parentCollectionId=0"
    config:
      functions: |
        function splitPosition(address collateralToken, bytes32 parentCollectionId, bytes32 conditionId, uint256[] calldata partition, uint256 amount) external {
            // txTo must be one of the 2 ConditionalTokens contracts
            require(
                txTo == 0x22DA1810B194ca018378464a58f6Ac2B10C9d244 || // CT (NYB)
                txTo == 0x9400F8Ad57e9e0F352345935d6D3175975eb1d9F,   // YB CT
                "target must be ConditionalTokens"
            );
            // collateralToken must be USDT
            require(collateralToken == 0x55d398326f99059fF775485246999027B3197955, "collateral must be USDT");
            // parentCollectionId must be zero (root collection)
            require(parentCollectionId == bytes32(0), "parent must be zero");
        }

        function mergePositions(address collateralToken, bytes32 parentCollectionId, bytes32 conditionId, uint256[] calldata partition, uint256 amount) external {
            // txTo must be one of the 2 ConditionalTokens contracts
            require(
