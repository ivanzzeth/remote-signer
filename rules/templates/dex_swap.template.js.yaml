# DEX Swap template (evm_js) — Uniswap V2 router swap method whitelist.
# Filename *.template.js.yaml = template fully driven by evm_js rules (no evm_solidity_expression).
# Covers V2 swap methods: swapExactTokensForTokens, swapExactETHForTokens, swapExactTokensForETH,
#   swapTokensForExactTokens, swapETHForExactTokens, swapTokensForExactETH.
# V3 methods (exactInputSingle, exactInput) are future work — tuple params require more complex decoding.
# Validation: router address whitelist + method selector whitelist.

variables:
  - name: router_address
    type: address
    description: "DEX router contract address (e.g. Uniswap V2 Router 0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D)"
    required: true
  - name: allowed_tokens
    type: address_list
    description: "Comma-separated allowed token addresses in swap path. Empty = any token."
    required: false
    default: ""
  - name: max_amount_in
    type: string
    description: "Max input amount per swap, in token smallest unit. -1 = no cap."
    required: false
    default: "-1"

test_variables:
  chain_id: "1"
  router_address: "0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D"
  allowed_tokens: ""
  max_amount_in: "-1"

rules:
  - id: "dex-swap-v2"
    name: "DEX Swap V2 method whitelist"
    type: "evm_js"
    mode: "whitelist"
    enabled: true
    description: "Uniswap V2 router swap methods; validates router address and method selector whitelist"
    config:
      sign_type_filter: "transaction"
      script: |
        function validate(input) {
          var ctx = rs.tx.require(input);
          var router = config.router_address;
          require(router && isAddress(router), 'invalid router config');
          require(rs.addr.inList(ctx.tx.to, [router]), 'wrong router');
          var allowedSels = [
            selector('swapExactTokensForTokens(uint256,uint256,address[],address,uint256)'),
            selector('swapExactETHForTokens(uint256,address[],address,uint256)'),
            selector('swapExactTokensForETH(uint256,uint256,address[],address,uint256)'),
            selector('swapTokensForExactTokens(uint256,uint256,address[],address,uint256)'),
            selector('swapETHForExactTokens(uint256,address[],address,uint256)'),
            selector('swapTokensForExactETH(uint256,uint256,address[],address,uint256)')
          ];
          var found = false;
          for (var i = 0; i < allowedSels.length; i++) {
            if (eq(ctx.selector, allowedSels[i])) { found = true; break; }
          }
          require(found, 'method not allowed');
          return ok();
        }
    test_cases:
      - name: "pass: swapExactTokensForTokens on correct router"
        input:
          sign_type: "transaction"
          chain_id: 1
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          transaction:
            from: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
            to: "0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D"
            value: "0"
            data: ""
            methodId: "0x38ed1739"
        expect_pass: true
      - name: "reject: method not in allowlist (name())"
        input:
          sign_type: "transaction"
          chain_id: 1
          signer: "0x0000000000000000000000000000000000000002"
          transaction:
            from: "0x0000000000000000000000000000000000000002"
            to: "0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D"
            value: "0"
            data: "0x06fdde03"
            methodId: "0x06fdde03"
        expect_pass: false
        expect_reason: "method not allowed"
      - name: "reject: wrong router address"
        input:
          sign_type: "transaction"
          chain_id: 1
          signer: "0x0000000000000000000000000000000000000002"
          transaction:
            from: "0x0000000000000000000000000000000000000002"
            to: "0x000000000000000000000000000000000000dEaD"
            value: "0"
            data: ""
            methodId: "0x38ed1739"
        expect_pass: false
        expect_reason: "wrong router"
