# Safe template (evm_js) — generic, composable.
# Filename *.template.js.yaml = template fully driven by evm_js rules (no evm_solidity_expression).
# Validates SafeTx (typed_data) and execTransaction (transaction): allowed Safe(s), value=0, CALL only,
# inner "to" in allowed_safe_tx_to_addresses. Does NOT validate inner calldata; delegate to other rules
# (e.g. ERC20, multisend) via delegate_to or script-returned delegate_to (e.g. from delegate_to_by_target).
# Uses engine-injected: eq, toChecksum, isAddress, selector, fail, ok.

variables:
  - name: chain_id
    type: string
    description: "Chain ID (e.g. 1 for mainnet)"
    required: true
  - name: allowed_safe_addresses
    type: address_list
    description: "Comma-separated allowed Safe addresses (verifyingContract / tx to)"
    required: true
  - name: allowed_safe_address_for_testing
    type: address
    description: "Single Safe address for test cases (verifyingContract, transaction.to). Must be one of allowed_safe_addresses."
    required: false
    default: ""
  - name: allowed_safe_tx_to_addresses
    type: address_list
    description: "Comma-separated allowed inner 'to' addresses (each can be routed to a different rule)"
    required: true
  - name: delegate_to
    type: string
    description: "Default target rule ID when delegating (optional)"
    required: false
    default: ""
  - name: delegate_to_by_target
    type: string
    description: "Optional 'addr:rule_id,addr:rule_id' to route by inner to (overrides delegate_to per address)"
    required: false
    default: ""
  - name: delegate_mode
    type: string
    description: "Delegation mode: single (default) or per_item"
    required: false
    default: "single"
  - name: test_inner_to
    type: address
    description: "Single allowed inner 'to' address for test cases (first of allowed_safe_tx_to_addresses)"
    required: false
    default: ""

test_variables:
  chain_id: "1"
  allowed_safe_addresses: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4"
  allowed_safe_address_for_testing: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4"
  allowed_safe_tx_to_addresses: "0xdAC17F958D2ee523a2206206994597C13D831ec7,0x4B20993Bc481177ec7E8f571ceCaE8A9e22C02db"
  delegate_to: ""
  delegate_mode: "single"
  test_inner_to: "0xdAC17F958D2ee523a2206206994597C13D831ec7"

rules:
  # Blocklist: block SafeTx with DELEGATECALL (operation !== 0) so rejection reason reaches the client.
  - id: "safe-block-delegatecall"
    name: "Safe block DELEGATECALL"
    type: "evm_js"
    mode: "blocklist"
    enabled: true
    chain_id: "${chain_id}"
    description: "Block SafeTx with DELEGATECALL (operation must be CALL)"
    config:
      sign_type_filter: "typed_data,transaction"
      script: |
        function validate(input) {
          var m = rs.typedData.match(input, 'SafeTx');
          if (!m.matched) return ok();
          if (config.allowed_safe_addresses === '') return ok();
          var chainId = parseInt(config.chain_id, 10) || 0;
          var domain = m.domain || {};
          var msg = m.message || {};
          try {
            rs.typedData.requireDomain(domain, {
              chainId: chainId,
              allowedContracts: config.allowed_safe_addresses
            });
          } catch (e) { return ok(); }
          rs.int.requireEq(msg.operation, 0, 'only CALL allowed');
          return ok();
        }
    test_cases:
      - name: "CALL operation should pass (not blocked)"
        input:
          sign_type: "typed_data"
          chain_id: "${chain_id}"
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          typed_data:
            primaryType: "SafeTx"
            domain:
              chainId: "${chain_id}"
              verifyingContract: "${allowed_safe_address_for_testing}"
            message:
              to: "${test_inner_to}"
              value: "0"
              data: "0x"
              operation: "0"
              gasPrice: "0"
              gasToken: "0x0000000000000000000000000000000000000000"
              refundReceiver: "0x0000000000000000000000000000000000000000"
              nonce: "0"
        expect_pass: true
      - name: "DELEGATECALL operation should be blocked"
        input:
          sign_type: "typed_data"
          chain_id: "${chain_id}"
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          typed_data:
            primaryType: "SafeTx"
            domain:
              chainId: "${chain_id}"
              verifyingContract: "${allowed_safe_address_for_testing}"
            message:
              to: "${test_inner_to}"
              value: "0"
              data: "0x"
              operation: "1"
              gasPrice: "0"
              gasToken: "0x0000000000000000000000000000000000000000"
              refundReceiver: "0x0000000000000000000000000000000000000000"
              nonce: "0"
        expect_pass: false
        expect_reason: "only CALL allowed"

  - id: "safe-safetx-exec-transaction"
    name: "Safe SafeTx and execTransaction"
    type: "evm_js"
    mode: "whitelist"
    enabled: true
    chain_id: "${chain_id}"
    description: "Validate SafeTx/execTransaction; inner to in allowlist; return payload for delegation to target rules"
    config:
      delegate_to: "${delegate_to}"
      delegate_mode: "${delegate_mode}"
      script: |
        function validate(input) {
          rs.config.requireNonEmpty('allowed_safe_addresses', 'missing or invalid allowed_safe_addresses');
          rs.config.requireNonEmpty('allowed_safe_tx_to_addresses', 'missing or invalid allowed_safe_tx_to_addresses');
          var chainId = parseInt(config.chain_id, 10) || 0;

          if (input.sign_type === 'typed_data') {
            return validateSafeTx(input, chainId);
          }
          if (input.sign_type === 'transaction') {
            return validateExecTransaction(input, chainId);
          }
          revert('sign_type must be typed_data or transaction');
        }

        function resolveDelegateTo(innerToChecksum) {
          return rs.delegate.resolveByTarget(innerToChecksum, config.delegate_to_by_target, config.delegate_to);
        }

        function buildPayload(signer, chainId, innerTo, innerData) {
          innerData = innerData || '0x';
          return {
            sign_type: 'transaction',
            chain_id: chainId,
            signer: signer,
            transaction: { from: signer, to: innerTo, value: '0x0', data: innerData }
          };
        }

        function validateSafeTx(input, chainId) {
          var ctx = rs.typedData.require(input, 'SafeTx');
          var domain = ctx.domain || {};
          var msg = ctx.message || {};
          var vc = (domain.verifyingContract || '').trim();
          require(isAddress(vc), 'invalid verifyingContract');
          require(rs.addr.inList(vc, config.allowed_safe_addresses), 'verifyingContract must be allowed Safe');
          rs.typedData.requireDomain(domain, { chainId: chainId, requireVerifyingContract: false });
          rs.bigint.requireEq(msg.value, '0', 'value must be zero');
          rs.int.requireEq(msg.operation, 0, 'only CALL allowed');
          rs.bigint.requireEq(msg.gasPrice, '0', 'gasPrice must be zero');
          rs.addr.requireZero((msg.gasToken || '').trim(), 'gasToken must be zero');
          rs.addr.requireZero((msg.refundReceiver || '').trim(), 'refundReceiver must be zero');
          var innerTo = (msg.to || '').trim();
          require(isAddress(innerTo), 'invalid inner to');
          require(rs.addr.inList(innerTo, config.allowed_safe_tx_to_addresses), 'inner to must be in allowed_safe_tx_to_addresses');
          var data = msg.data || '0x';
          var payload = buildPayload(toChecksum(vc), chainId, toChecksum(innerTo), data);
          var delegateTo = resolveDelegateTo(toChecksum(innerTo));
          if (delegateTo) return { valid: true, payload: payload, delegate_to: delegateTo };
          return ok();
        }

        function validateExecTransaction(input, chainId) {
          var tx = input.transaction;
          require(tx && tx.to, 'missing transaction or to');
          require(isAddress(tx.to), 'invalid to');
          require(rs.addr.inList(tx.to, config.allowed_safe_addresses), 'txTo must be allowed Safe');
          require(input.chain_id === chainId, 'chainId mismatch');
          var data = (tx.data || '0x').replace(/^0x/, '');
          if (data.length < 8) return ok();
          var sel = '0x' + data.slice(0, 8);
          var execSel = selector('execTransaction(address,uint256,bytes,uint8,uint256,uint256,uint256,address,address,bytes)');
          require(eq(sel, execSel), 'not execTransaction');
          var parsed = rs.gnosis.safe.parseExecTransactionData('0x' + data);
          require(parsed.valid, String(parsed.reason || 'parse failed'));
          require(parsed.valueZero, 'value must be zero');
          require(parsed.operationCALL, 'only CALL allowed');
          if (!parsed.innerHex || parsed.innerHex === '0x') return ok();
          var innerToChecksum = toChecksum(parsed.innerTo);
          require(rs.addr.inList(parsed.innerTo, config.allowed_safe_tx_to_addresses), 'inner to must be in allowed_safe_tx_to_addresses');
          var payload = buildPayload(toChecksum(tx.to), chainId, innerToChecksum, parsed.innerHex);
          var delegateTo = resolveDelegateTo(innerToChecksum);
          if (delegateTo) return { valid: true, payload: payload, delegate_to: delegateTo };
          return ok();
        }
      sign_type_filter: "typed_data,transaction"
    test_cases:
      - name: "SafeTx pass: verifyingContract and inner to in allowlists"
        input:
          sign_type: "typed_data"
          chain_id: "${chain_id}"
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          typed_data:
            primaryType: "SafeTx"
            domain:
              chainId: "${chain_id}"
              verifyingContract: "${allowed_safe_address_for_testing}"
            message:
              to: "${test_inner_to}"
              value: "0"
              data: "0x"
              operation: "0"
              safeTxGas: "0"
              baseGas: "0"
              gasPrice: "0"
              gasToken: "0x0000000000000000000000000000000000000000"
              refundReceiver: "0x0000000000000000000000000000000000000000"
              nonce: "0"
        expect_pass: true
      - name: "SafeTx reject: wrong verifyingContract"
        input:
          sign_type: "typed_data"
          chain_id: "${chain_id}"
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          typed_data:
            primaryType: "SafeTx"
            domain:
              chainId: "${chain_id}"
              verifyingContract: "0x000000000000000000000000000000000000dEaD"
            message:
              to: "${test_inner_to}"
              value: "0"
              data: "0x"
              operation: "0"
              gasPrice: "0"
              gasToken: "0x0000000000000000000000000000000000000000"
              refundReceiver: "0x0000000000000000000000000000000000000000"
              nonce: "0"
        expect_pass: false
        expect_reason: "invalid verifying contract"
      - name: "SafeTx reject: inner to not in allowed_safe_tx_to_addresses"
        input:
          sign_type: "typed_data"
          chain_id: "${chain_id}"
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          typed_data:
            primaryType: "SafeTx"
            domain:
              chainId: "${chain_id}"
              verifyingContract: "${allowed_safe_address_for_testing}"
            message:
              to: "0x000000000000000000000000000000000000dEaD"
              value: "0"
              data: "0x"
              operation: "0"
              gasPrice: "0"
              gasToken: "0x0000000000000000000000000000000000000000"
              refundReceiver: "0x0000000000000000000000000000000000000000"
              nonce: "0"
        expect_pass: false
        expect_reason: "inner to must be in allowed_safe_tx_to_addresses"
      - name: "SafeTx reject: value non-zero"
        input:
          sign_type: "typed_data"
          chain_id: "${chain_id}"
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          typed_data:
            primaryType: "SafeTx"
            domain:
              chainId: "${chain_id}"
              verifyingContract: "${allowed_safe_address_for_testing}"
            message:
              to: "${test_inner_to}"
              value: "1"
              data: "0x"
              operation: "0"
              gasPrice: "0"
              gasToken: "0x0000000000000000000000000000000000000000"
              refundReceiver: "0x0000000000000000000000000000000000000000"
              nonce: "0"
        expect_pass: false
        expect_reason: "value must be zero"
      - name: "transaction pass: to allowed Safe, no data"
        input:
          sign_type: "transaction"
          chain_id: "${chain_id}"
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          transaction:
            from: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
            to: "${allowed_safe_address_for_testing}"
            value: "0x0"
            data: "0x"
        expect_pass: true
      - name: "transaction reject: to not allowed Safe"
        input:
          sign_type: "transaction"
          chain_id: "${chain_id}"
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          transaction:
            from: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
            to: "0x000000000000000000000000000000000000dEaD"
            value: "0x0"
            data: "0x"
        expect_pass: false
        expect_reason: "txTo must be allowed Safe"