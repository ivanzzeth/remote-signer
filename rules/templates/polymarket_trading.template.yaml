- id: polymarket-safe-execute-transaction
  name: Polymarket Safe Execute Transaction
  type: evm_solidity_expression
  mode: whitelist
  enabled: true
  chain_id: ${chain_id}
  description: Allow Safe wallet execTransaction with txTo validation and internal call validation
  config:
    functions: "function execTransaction(\n    address to,\n    uint256 value,\n    bytes calldata data,\n    uint8 operation,\n\
      \    uint256 safeTxGas,\n    uint256 baseGas,\n    uint256 gasPrice,\n    address gasToken,\n    address refundReceiver,\n\
      \    bytes memory signatures\n) external {\n    // [CRITICAL] Validate txTo is one of the allowed Safe wallet addresses\n\
      \    require(\n        in(txTo, ${allowed_safe_addresses}),\n        \"txTo must be an allowed Safe wallet\"\n    );\n\
      \n    // Value must be zero (no native token transfer)\n    require(value == 0, \"value must be zero\");\n\n    // [VULN-11]\
      \ Only CALL operations allowed — block DELEGATECALL\n    require(operation == 0, \"only CALL allowed\");\n\n    // [VULN-12]\
      \ Gas manipulation protection\n    require(gasPrice == 0, \"gasPrice must be zero\");\n    require(gasToken == address(0),\
      \ \"gasToken must be zero\");\n    require(refundReceiver == address(0), \"refundReceiver must be zero\");\n\n    //\
      \ Validate internal call based on 'to' address and data\n    // All operations (approve/split/merge/redeem) are validated\
      \ here\n\n    // Allow empty data (no internal call)\n    if (data.length == 0) {\n        return;\n    }\n\n    //\
      \ Pure Solidity parameter decoding — no assembly, uses abi.decode on calldata slices\n\n    // USDC.e operations (${usdc_bridged_address})\n\
      \    if (to == ${usdc_bridged_address}) {\n        require(data.length >= 4, \"invalid data length\");\n        bytes4\
      \ selector = bytes4(data);\n\n        bytes4 APPROVE_SELECTOR = bytes4(keccak256(\"approve(address,uint256)\")); //\
      \ = 0x095ea7b3\n\n        if (selector == APPROVE_SELECTOR) {\n            require(data.length >= 68, \"invalid approve\
      \ data length\");\n            (address spender, ) = abi.decode(data[4:], (address, uint256));\n            require(\n\
      \                spender == ${ctf_exchange_address} || // CTF Exchange\n                spender == ${neg_risk_adapter_address}\
      \ || // NegRiskAdapter\n                spender == ${neg_risk_exchange_address},   // NegRiskExchange\n            \
      \    \"spender must be allowed protocol contract\"\n            );\n            return;\n        }\n        revert(\"\
      unsupported USDC.e operation\");\n    }\n\n    // CTF operations (${conditional_tokens_address})\n    if (to == ${conditional_tokens_address})\
      \ {\n        require(data.length >= 4, \"invalid data length\");\n        bytes4 selector = bytes4(data);\n\n      \
      \  bytes4 SET_APPROVAL_FOR_ALL_SELECTOR = bytes4(keccak256(\"setApprovalForAll(address,bool)\")); // = 0xa22cb465\n\
      \        bytes4 SPLIT_POSITION_SELECTOR = bytes4(keccak256(\"splitPosition(address,bytes32,bytes32,uint256[],uint256)\"\
      )); // = 0x72ce4275\n        bytes4 MERGE_POSITIONS_SELECTOR = bytes4(keccak256(\"mergePositions(address,bytes32,bytes32,uint256[],uint256)\"\
      )); // = 0x9e7212ad\n        bytes4 REDEEM_POSITIONS_SELECTOR = bytes4(keccak256(\"redeemPositions(address,bytes32,bytes32,uint256[])\"\
      )); // = 0x01b7037c\n\n        if (selector == SET_APPROVAL_FOR_ALL_SELECTOR) {\n            require(data.length >=\
      \ 68, \"invalid setApprovalForAll data length\");\n            (address operator, bool approved) = abi.decode(data[4:],\
      \ (address, bool));\n            require(approved, \"approval must be true\");\n            require(\n             \
      \   operator == ${ctf_exchange_address} || // CTF Exchange\n                operator == ${neg_risk_adapter_address}\
      \ || // NegRiskAdapter\n                operator == ${neg_risk_exchange_address},   // NegRiskExchange\n           \
      \     \"operator must be allowed protocol contract\"\n            );\n            return;\n        }\n\n        if (selector\
      \ == SPLIT_POSITION_SELECTOR || selector == MERGE_POSITIONS_SELECTOR) {\n            require(data.length >= 164, \"\
      invalid split/merge data length\");\n            (address collateralToken, bytes32 parentCollectionId, , , ) = abi.decode(data[4:],\
      \ (address, bytes32, bytes32, uint256[], uint256));\n            require(collateralToken == ${usdc_bridged_address},\
      \ \"collateral must be USDC.e\");\n            require(parentCollectionId == bytes32(0), \"parent must be zero\");\n\
      \            return;\n        }\n\n        if (selector == REDEEM_POSITIONS_SELECTOR) {\n            require(data.length\
      \ >= 132, \"invalid redeem data length\");\n            (address collateralToken, bytes32 parentCollectionId, , ) =\
      \ abi.decode(data[4:], (address, bytes32, bytes32, uint256[]));\n            require(collateralToken == ${usdc_bridged_address},\
      \ \"collateral must be USDC.e\");\n            require(parentCollectionId == bytes32(0), \"parent must be zero\");\n\
      \            return;\n        }\n\n        revert(\"unsupported CTF operation\");\n    }\n\n    // NegRiskAdapter operations\
      \ (${neg_risk_adapter_address})\n    if (to == ${neg_risk_adapter_address}) {\n        require(data.length >= 4, \"\
      invalid data length\");\n        bytes4 selector = bytes4(data);\n\n        bytes4 NEGRISK_SPLIT_SELECTOR = bytes4(keccak256(\"\
      splitPosition(bytes32,uint256)\")); // = 0xa3d7da1d\n        bytes4 NEGRISK_MERGE_SELECTOR = bytes4(keccak256(\"mergePositions(bytes32,uint256)\"\
      )); // = 0xb10c5c17\n        bytes4 NEGRISK_REDEEM_SELECTOR = bytes4(keccak256(\"redeemPositions(bytes32,uint256[])\"\
      )); // = 0xdbeccb23\n        bytes4 SPLIT_POSITION_SELECTOR = bytes4(keccak256(\"splitPosition(address,bytes32,bytes32,uint256[],uint256)\"\
      )); // = 0x72ce4275\n        bytes4 MERGE_POSITIONS_SELECTOR = bytes4(keccak256(\"mergePositions(address,bytes32,bytes32,uint256[],uint256)\"\
      )); // = 0x9e7212ad\n\n        if (selector == NEGRISK_SPLIT_SELECTOR || selector == NEGRISK_MERGE_SELECTOR || selector\
      \ == NEGRISK_REDEEM_SELECTOR) {\n            return;\n        }\n\n        if (selector == SPLIT_POSITION_SELECTOR ||\
      \ selector == MERGE_POSITIONS_SELECTOR) {\n            require(data.length >= 164, \"invalid NegRisk 5-param data length\"\
      );\n            (address nrCollateral, bytes32 nrParent, , , ) = abi.decode(data[4:], (address, bytes32, bytes32, uint256[],\
      \ uint256));\n            require(nrCollateral == ${usdc_bridged_address}, \"NegRisk collateral must be USDC.e\");\n\
      \            require(nrParent == bytes32(0), \"NegRisk parent must be zero\");\n            return;\n        }\n\n \
      \       revert(\"unsupported NegRiskAdapter operation\");\n    }\n\n    // Reject all other target addresses\n    revert(\"\
      unsupported target contract\");\n}\n"
    description: Safe execution - signature already validated
    test_cases:
    - name: should pass execTransaction with zero value
      input:
        to: ${allowed_safe_address_for_testing}
        data: ''
      expect_pass: true
    - name: should pass execTransaction with USDC.e approve to CTF Exchange (real tx 0xfc9db476)
      input:
        to: ${allowed_safe_address_for_testing}
        data: ''
      expect_pass: true
