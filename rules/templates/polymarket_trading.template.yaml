# Polymarket Trading (Order + SafeTx + execTransaction) — capability template. Split from polymarket_safe.template.yaml.
variables:
- name: ctf_exchange_address
  type: address
  description: CTF Exchange contract address
  required: true
- name: neg_risk_adapter_address
  type: address
  description: NegRiskAdapter contract address
  required: true
- name: neg_risk_exchange_address
  type: address
  description: NegRiskExchange contract address
  required: true
- name: conditional_tokens_address
  type: address
  description: ConditionalTokens (CTF) contract address
  required: true
- name: safe_proxy_factory_address
  type: address
  description: Safe Proxy Factory contract address
  required: true
- name: usdc_bridged_address
  type: address
  description: USDC.e (Bridged) token address
  required: true
- name: allowed_safe_address_for_testing
  type: address
  description: Single Safe address for test payload (to, maker, signer, verifyingContract, etc.)
  required: true
- name: allowed_safe_addresses
  type: string
  description: 'Comma-separated list of allowed Safe addresses (for expressions: verifyingContract / txTo). Use in() in rules.'
  required: true
- name: clob_auth_domain_name
  type: string
  description: ClobAuth EIP-712 domain name
  required: true
- name: clob_auth_domain_version
  type: string
  description: ClobAuth EIP-712 domain version
  required: true
- name: ctf_exchange_domain_name
  type: string
  description: CTF Exchange EIP-712 domain name
  required: true
- name: ctf_exchange_domain_version
  type: string
  description: CTF Exchange EIP-712 domain version
  required: true
- name: safe_factory_domain_name
  type: string
  description: Safe Factory EIP-712 domain name
  required: true
test_variables:
  chain_id: '137'
  ctf_exchange_address: '0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E'
  neg_risk_adapter_address: '0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296'
  neg_risk_exchange_address: '0xC5d563A36AE78145C45a50134d48A1215220f80a'
  conditional_tokens_address: '0x4D97DCd97eC945f40cF65F87097ACe5EA0476045'
  safe_proxy_factory_address: '0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b'
  usdc_bridged_address: '0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174'
  allowed_safe_address_for_testing: '0xaC52BebecA7f5FA1561fa9Ab8DA136602D21b837'
  allowed_safe_addresses: '0xaC52BebecA7f5FA1561fa9Ab8DA136602D21b837'
  clob_auth_domain_name: ClobAuthDomain
  clob_auth_domain_version: '1'
  ctf_exchange_domain_name: Polymarket CTF Exchange
  ctf_exchange_domain_version: '1'
  safe_factory_domain_name: Polymarket Contract Proxy Factory
rules:
- id: polymarket-order-signature
  name: Polymarket Order Signature
  type: evm_solidity_expression
  mode: whitelist
  enabled: true
  chain_id: ${chain_id}
  description: Validate Polymarket CTF Exchange order signatures
  config:
    typed_data_struct: "struct Order {\n    uint256 salt;\n    address maker;\n    address signer;\n    address taker;\n \
      \   uint256 tokenId;\n    uint256 makerAmount;\n    uint256 takerAmount;\n    uint256 expiration;\n    uint256 nonce;\n\
      \    uint256 feeRateBps;\n    uint8 side;\n    uint8 signatureType;\n}\n"
    typed_data_expression: "// Domain validation\nrequire(\n  keccak256(bytes(eip712_domainName)) == keccak256(bytes(\"${ctf_exchange_domain_name}\"\
      )),\n  \"invalid domain name\"\n);\nrequire(\n  keccak256(bytes(eip712_domainVersion)) == keccak256(bytes(\"${ctf_exchange_domain_version}\"\
      )),\n  \"invalid domain version\"\n);\n// [VULN-05] Verify the contract address to prevent fake exchange attacks\nrequire(\n\
      \  eip712_domainContract == ${ctf_exchange_address},\n  \"invalid verifying contract\"\n);\n\n// Order validation via\
      \ struct instance\n// taker must be zero address for public orders (anyone can fill)\nrequire(order.taker == address(0),\
      \ \"taker must be zero address\");\n\n// [VULN-10] Signer identity validation — order.signer must match the actual signing\
      \ key\nrequire(order.signer == ctx_signer, \"order signer must match signing key\");\n\n// Fee validation: max 10% (1000\
      \ basis points)\nrequire(order.feeRateBps <= 1000, \"fee exceeds 10%\");\n"
    sign_type_filter: typed_data
    description: CTF Exchange order signing with fee limits and zero taker
    test_cases:
    - name: should pass valid order with zero taker
      input:
        typed_data:
          primaryType: Order
          domain:
            name: ${ctf_exchange_domain_name}
            version: ${clob_auth_domain_version}
            chainId: ${chain_id}
            verifyingContract: ${ctf_exchange_address}
          message:
            salt: '12345'
            maker: ${allowed_safe_address_for_testing}
            signer: ${allowed_safe_address_for_testing}
            taker: '0x0000000000000000000000000000000000000000'
            tokenId: '1'
            makerAmount: '1000000000000000000'
            takerAmount: '1000000000000000000'
            expiration: '1893456000'
            nonce: '0'
            feeRateBps: '100'
            side: '0'
            signatureType: '0'
        signer: ${allowed_safe_address_for_testing}
      expect_pass: true
    - name: should reject non-zero taker
      input:
        typed_data:
          primaryType: Order
          domain:
            name: ${ctf_exchange_domain_name}
            version: ${clob_auth_domain_version}
            chainId: ${chain_id}
            verifyingContract: ${ctf_exchange_address}
          message:
            salt: '12345'
            maker: ${allowed_safe_address_for_testing}
            signer: ${allowed_safe_address_for_testing}
            taker: '0x1111111111111111111111111111111111111111'
            tokenId: '1'
            makerAmount: '1000000000000000000'
            takerAmount: '1000000000000000000'
            expiration: '1893456000'
            nonce: '0'
            feeRateBps: '100'
            side: '0'
            signatureType: '0'
        signer: ${allowed_safe_address_for_testing}
      expect_pass: false
      expect_reason: taker must be zero address
    - name: should reject wrong verifying contract
      input:
        typed_data:
          primaryType: Order
          domain:
            name: ${ctf_exchange_domain_name}
            version: ${clob_auth_domain_version}
            chainId: ${chain_id}
            verifyingContract: '0xDEADDEADDEADDEADDEADDEADDEADDEADDEADDEAD'
          message:
            salt: '12345'
            maker: ${allowed_safe_address_for_testing}
            signer: ${allowed_safe_address_for_testing}
            taker: '0x0000000000000000000000000000000000000000'
            tokenId: '1'
            makerAmount: '1000000000000000000'
            takerAmount: '1000000000000000000'
            expiration: '1893456000'
            nonce: '0'
            feeRateBps: '100'
            side: '0'
            signatureType: '0'
        signer: ${allowed_safe_address_for_testing}
      expect_pass: false
      expect_reason: invalid verifying contract
- id: polymarket-safetx-signature
  name: Polymarket SafeTx Signature
  type: evm_solidity_expression
  mode: whitelist
  enabled: true
  chain_id: ${chain_id}
  description: Validate Safe wallet transaction signatures on Polygon
  config:
    typed_data_struct: "struct SafeTx {\n    address to;\n    uint256 value;\n    bytes data;\n    uint8 operation;\n    uint256\
      \ safeTxGas;\n    uint256 baseGas;\n    uint256 gasPrice;\n    address gasToken;\n    address refundReceiver;\n    uint256\
      \ nonce;\n}\n"
    typed_data_expression: "// Domain validation for Safe on Polygon\nrequire(eip712_domainChainId == ${chain_id}, \"SafeTx\
      \ must be on Polygon\");\n// [CRITICAL] verifyingContract must be one of the allowed Safe wallet addresses\nrequire(\n\
      \    in(eip712_domainContract, ${allowed_safe_addresses}),\n    \"verifyingContract must be an allowed Safe wallet\"\
      \n);\n\n// Value must be 0 for token operations (no native token transfer)\n// Access via struct instance\nrequire(safeTx.value\
      \ == 0, \"ETH value must be zero\");\n\n// [VULN-11] Only CALL operations allowed — block DELEGATECALL\nrequire(safeTx.operation\
      \ == 0, \"only CALL operations allowed\");\n\n// [VULN-12] Gas manipulation protection\nrequire(safeTx.gasPrice == 0,\
      \ \"gasPrice must be zero\");\nrequire(safeTx.gasToken == address(0), \"gasToken must be zero\");\nrequire(safeTx.refundReceiver\
      \ == address(0), \"refundReceiver must be zero\");\n\n// [CRITICAL] Validate internal call data - only allow approved\
      \ operations\nbytes memory data = safeTx.data;\n\n// [CRITICAL] Data must not be empty - all Safe transactions must\
      \ have valid internal operations\nrequire(data.length > 0, \"data must not be empty\");\n\n// Must have at least 4 bytes\
      \ for function selector\nrequire(data.length >= 4, \"data too short for function selector\");\n\n    // Define function\
      \ selectors using function signatures\n    bytes4 APPROVE_SELECTOR = bytes4(keccak256(\"approve(address,uint256)\"));\
      \ // = 0x095ea7b3\n    bytes4 SET_APPROVAL_FOR_ALL_SELECTOR = bytes4(keccak256(\"setApprovalForAll(address,bool)\"));\
      \ // = 0xa22cb465\n    bytes4 SPLIT_POSITION_SELECTOR = bytes4(keccak256(\"splitPosition(address,bytes32,bytes32,uint256[],uint256)\"\
      )); // = 0x72ce4275\n    bytes4 MERGE_POSITIONS_SELECTOR = bytes4(keccak256(\"mergePositions(address,bytes32,bytes32,uint256[],uint256)\"\
      )); // = 0x9e7212ad\n    bytes4 REDEEM_POSITIONS_SELECTOR = bytes4(keccak256(\"redeemPositions(address,bytes32,bytes32,uint256[])\"\
      )); // = 0x01b7037c\n    bytes4 NEGRISK_SPLIT_SELECTOR = bytes4(keccak256(\"splitPosition(bytes32,uint256)\")); // =\
      \ 0xa3d7da1d\n    bytes4 NEGRISK_MERGE_SELECTOR = bytes4(keccak256(\"mergePositions(bytes32,uint256)\")); // = 0xb10c5c17\n\
      \    bytes4 NEGRISK_REDEEM_SELECTOR = bytes4(keccak256(\"redeemPositions(bytes32,uint256[])\")); // = 0xdbeccb23\n\n\
      \    // Extract function selector (first 4 bytes) - pure Solidity without assembly\n    bytes4 selector = bytes4(data[0])\
      \ | (bytes4(data[1]) >> 8) | (bytes4(data[2]) >> 16) | (bytes4(data[3]) >> 24);\n\n    // Validate based on target contract\
      \ (safeTx.to) and function selector\n    // USDC.e operations (${usdc_bridged_address})\n    if (safeTx.to == ${usdc_bridged_address})\
      \ {\n        // approve(address,uint256)\n        require(selector == APPROVE_SELECTOR, \"unsupported USDC.e operation\"\
      );\n        // Must have complete function call data (not just selector)\n        require(data.length >= 68, \"invalid\
      \ approve data length\");\n        // Skip selector and decode function parameters using abi.decode (pure Solidity,\
      \ no assembly)\n        bytes memory params = new bytes(data.length - 4);\n        for (uint256 i = 0; i < params.length;\
      \ i++) {\n            params[i] = data[i + 4];\n        }\n        (address spender, ) = abi.decode(params, (address,\
      \ uint256));\n        require(\n            spender == ${ctf_exchange_address} || // CTF Exchange\n            spender\
      \ == ${neg_risk_adapter_address} || // NegRiskAdapter\n            spender == ${neg_risk_exchange_address},   // NegRiskExchange\n\
      \            \"spender must be allowed protocol contract\"\n        );\n    }\n    // CTF operations (${conditional_tokens_address})\n\
      \    else if (safeTx.to == ${conditional_tokens_address}) {\n        // Allowed CTF operations\n        require(\n \
      \           selector == SET_APPROVAL_FOR_ALL_SELECTOR ||\n            selector == SPLIT_POSITION_SELECTOR ||\n     \
      \       selector == MERGE_POSITIONS_SELECTOR ||\n            selector == REDEEM_POSITIONS_SELECTOR,\n            \"\
      unsupported CTF operation\"\n        );\n        // Additional validation for specific operations\n        if (selector\
      \ == SET_APPROVAL_FOR_ALL_SELECTOR) {\n            // setApprovalForAll(address,bool): validate operator and approved\
      \ flag\n            require(data.length >= 68, \"invalid setApprovalForAll data length\");\n            // Skip selector\
      \ and decode function parameters (pure Solidity, no assembly)\n            bytes memory params = new bytes(data.length\
      \ - 4);\n            for (uint256 i = 0; i < params.length; i++) {\n                params[i] = data[i + 4];\n     \
      \       }\n            (address operator, bool approved) = abi.decode(params, (address, bool));\n            require(approved,\
      \ \"approval must be true\");\n            require(\n                operator == ${ctf_exchange_address} || // CTF Exchange\n\
      \                operator == ${neg_risk_adapter_address} || // NegRiskAdapter\n                operator == ${neg_risk_exchange_address},\
      \   // NegRiskExchange\n                \"operator must be allowed protocol contract\"\n            );\n        } else\
      \ if (selector == SPLIT_POSITION_SELECTOR || selector == MERGE_POSITIONS_SELECTOR) {\n            // splitPosition(address,bytes32,bytes32,uint256[],uint256)\
      \ / mergePositions(address,bytes32,bytes32,uint256[],uint256)\n            require(data.length >= 164, \"invalid split/merge\
      \ data length\");\n            // Skip selector and decode: collateralToken, parentCollectionId, conditionId, partition,\
      \ amount\n            bytes memory params = new bytes(data.length - 4);\n            for (uint256 i = 0; i < params.length;\
      \ i++) {\n                params[i] = data[i + 4];\n            }\n            (address collateralToken, bytes32 parentCollectionId,\
      \ , , ) = abi.decode(params, (address, bytes32, bytes32, uint256[], uint256));\n            require(\n             \
      \   collateralToken == ${usdc_bridged_address},\n                \"collateral must be USDC.e\"\n            );\n   \
      \         require(parentCollectionId == bytes32(0), \"parent must be zero\");\n        } else if (selector == REDEEM_POSITIONS_SELECTOR)\
      \ {\n            // redeemPositions(address,bytes32,bytes32,uint256[])\n            require(data.length >= 132, \"invalid\
      \ redeem data length\");\n            bytes memory params = new bytes(data.length - 4);\n            for (uint256 i\
      \ = 0; i < params.length; i++) {\n                params[i] = data[i + 4];\n            }\n            (address collateralToken,\
      \ bytes32 parentCollectionId, , ) = abi.decode(params, (address, bytes32, bytes32, uint256[]));\n            require(\n\
      \                collateralToken == ${usdc_bridged_address},\n                \"collateral must be USDC.e\"\n      \
      \      );\n            require(parentCollectionId == bytes32(0), \"parent must be zero\");\n        }\n    }\n    //\
      \ NegRiskAdapter operations (${neg_risk_adapter_address})\n    // NegRiskAdapter has both 2-param simplified variants\
      \ AND 5-param CTF-compatible variants\n    // 2-param: splitPosition(bytes32,uint256), mergePositions(bytes32,uint256),\
      \ redeemPositions(bytes32,uint256[])\n    // 5-param: splitPosition(address,bytes32,bytes32,uint256[],uint256), mergePositions(address,bytes32,bytes32,uint256[],uint256)\n\
      \    // The 5-param variants share the same selectors as CTF functions\n    else if (safeTx.to == ${neg_risk_adapter_address})\
      \ {\n        // Allowed NegRiskAdapter operations (both 2-param and 5-param variants)\n        if (selector == NEGRISK_SPLIT_SELECTOR\
      \ || selector == NEGRISK_MERGE_SELECTOR || selector == NEGRISK_REDEEM_SELECTOR) {\n            // 2-param simplified\
      \ variants: splitPosition(bytes32,uint256), mergePositions(bytes32,uint256), redeemPositions(bytes32,uint256[])\n  \
      \          // No additional validation needed - conditionId is dynamic per market, contract handles collateral internally\n\
      \        } else if (selector == SPLIT_POSITION_SELECTOR || selector == MERGE_POSITIONS_SELECTOR) {\n            // 5-param\
      \ CTF-compatible variants: splitPosition(address,bytes32,bytes32,uint256[],uint256) / mergePositions(address,bytes32,bytes32,uint256[],uint256)\n\
      \            // Validate collateralToken and parentCollectionId for defense-in-depth\n            require(data.length\
      \ >= 164, \"invalid NegRisk 5-param data length\");\n            bytes memory nrParams = new bytes(data.length - 4);\n\
      \            for (uint256 i = 0; i < nrParams.length; i++) {\n                nrParams[i] = data[i + 4];\n         \
      \   }\n            (address nrCollateral, bytes32 nrParent, , , ) = abi.decode(nrParams, (address, bytes32, bytes32,\
      \ uint256[], uint256));\n            require(nrCollateral == ${usdc_bridged_address}, \"NegRisk collateral must be USDC.e\"\
      );\n            require(nrParent == bytes32(0), \"NegRisk parent must be zero\");\n        } else {\n            revert(\"\
      unsupported NegRiskAdapter operation\");\n        }\n    }\n    // Reject all other target addresses\n    else {\n \
      \       revert(\"unsupported target contract\");\n    }\n"
    sign_type_filter: typed_data
    description: Safe transaction signing with value=0 constraint
    test_cases:
    - name: should pass SafeTx with zero value
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: ${allowed_safe_address_for_testing}
          message:
            to: ${usdc_bridged_address}
            value: '0'
            data: '0x095ea7b30000000000000000000000004bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982Effffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff'
            operation: '0'
            safeTxGas: '0'
            baseGas: '0'
            gasPrice: '0'
            gasToken: '0x0000000000000000000000000000000000000000'
            refundReceiver: '0x0000000000000000000000000000000000000000'
            nonce: '0'
      expect_pass: true
    - name: should reject SafeTx with non-zero value
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: ${allowed_safe_address_for_testing}
          message:
            to: ${usdc_bridged_address}
            value: '1000000000000000000'
            data: '0x095ea7b3'
            operation: '0'
            safeTxGas: '0'
            baseGas: '0'
            gasPrice: '0'
            gasToken: '0x0000000000000000000000000000000000000000'
            refundReceiver: '0x0000000000000000000000000000000000000000'
            nonce: '0'
      expect_pass: false
      expect_reason: ETH value must be zero
    - name: should reject SafeTx with DELEGATECALL
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: ${allowed_safe_address_for_testing}
          message:
            to: ${usdc_bridged_address}
            value: '0'
            data: '0x095ea7b3'
            operation: '1'
            safeTxGas: '0'
            baseGas: '0'
            gasPrice: '0'
            gasToken: '0x0000000000000000000000000000000000000000'
            refundReceiver: '0x0000000000000000000000000000000000000000'
            nonce: '0'
      expect_pass: false
      expect_reason: only CALL operations allowed
    - name: should reject SafeTx with non-zero gasPrice
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: ${allowed_safe_address_for_testing}
          message:
            to: ${usdc_bridged_address}
            value: '0'
            data: '0x095ea7b3'
            operation: '0'
            safeTxGas: '0'
            baseGas: '0'
            gasPrice: '1000000000'
            gasToken: ${usdc_bridged_address}
            refundReceiver: ${allowed_safe_address_for_testing}
            nonce: '0'
      expect_pass: false
      expect_reason: gasPrice must be zero
    - name: should reject SafeTx with zero verifyingContract
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: '0x0000000000000000000000000000000000000000'
          message:
            to: ${usdc_bridged_address}
            value: '0'
            data: '0x095ea7b3'
            operation: '0'
            safeTxGas: '0'
            baseGas: '0'
            gasPrice: '0'
            gasToken: '0x0000000000000000000000000000000000000000'
            refundReceiver: '0x0000000000000000000000000000000000000000'
            nonce: '0'
      expect_pass: false
      expect_reason: verifyingContract must be an allowed Safe wallet
    - name: should reject SafeTx with non-allowed verifyingContract
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: '0xDEADDEADDEADDEADDEADDEADDEADDEADDEADDEAD'
          message:
            to: ${usdc_bridged_address}
            value: '0'
            data: '0x095ea7b30000000000000000000000004bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982Effffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff'
            operation: '0'
            safeTxGas: '0'
            baseGas: '0'
            gasPrice: '0'
            gasToken: '0x0000000000000000000000000000000000000000'
            refundReceiver: '0x0000000000000000000000000000000000000000'
            nonce: '0'
      expect_pass: false
      expect_reason: verifyingContract must be an allowed Safe wallet
    - name: should reject SafeTx with empty data
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: ${allowed_safe_address_for_testing}
          message:
            to: ${usdc_bridged_address}
            value: '0'
            data: 0x
            operation: '0'
            safeTxGas: '0'
            baseGas: '0'
            gasPrice: '0'
            gasToken: '0x0000000000000000000000000000000000000000'
            refundReceiver: '0x0000000000000000000000000000000000000000'
            nonce: '0'
      expect_pass: false
      expect_reason: data must not be empty
    - name: should reject SafeTx with unsupported target contract
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: ${allowed_safe_address_for_testing}
          message:
            to: '0xDEADDEADDEADDEADDEADDEADDEADDEADDEADDEAD'
            value: '0'
            data: '0xa9059cbb0000000000000000000000004bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982Effffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff'
            operation: '0'
            safeTxGas: '0'
            baseGas: '0'
            gasPrice: '0'
            gasToken: '0x0000000000000000000000000000000000000000'
            refundReceiver: '0x0000000000000000000000000000000000000000'
            nonce: '0'
      expect_pass: false
      expect_reason: unsupported target contract
    - name: should reject SafeTx with unsupported operation on USDC.e
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: ${allowed_safe_address_for_testing}
          message:
            to: ${usdc_bridged_address}
            value: '0'
            data: '0xa9059cbb0000000000000000000000004bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982Effffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff'
            operation: '0'
            safeTxGas: '0'
            baseGas: '0'
            gasPrice: '0'
            gasToken: '0x0000000000000000000000000000000000000000'
            refundReceiver: '0x0000000000000000000000000000000000000000'
            nonce: '0'
      expect_pass: false
      expect_reason: unsupported USDC.e operation
    - name: should pass SafeTx with CTF redeemPositions (real tx 0x714b3d)
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: ${allowed_safe_address_for_testing}
          message:
            to: ${conditional_tokens_address}
            value: '0'
            data: ''
            operation: '0'
            safeTxGas: '217890'
            baseGas: '0'
            gasPrice: '0'
            gasToken: '0x0000000000000000000000000000000000000000'
            refundReceiver: '0x0000000000000000000000000000000000000000'
            nonce: '0'
        signer: '0x88eD75e9eCE373997221E3c0229e74007C1AD718'
      expect_pass: true
    - name: should pass SafeTx with USDC.e approve to CTF Exchange (real tx 0xfc9db476)
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: ${allowed_safe_address_for_testing}
          message:
            to: ${usdc_bridged_address}
            value: '0'
            data: '0x095ea7b30000000000000000000000004bfb41d5b3570defd03c39a9a4d8de6bd8b8982effffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff'
            operation: '0'
            safeTxGas: '122295'
            baseGas: '0'
            gasPrice: '0'
            gasToken: '0x0000000000000000000000000000000000000000'
            refundReceiver: '0x0000000000000000000000000000000000000000'
            nonce: '0'
      expect_pass: true
    - name: should pass SafeTx with USDC.e approve to NegRiskAdapter (real tx 0x290cdcc9)
      input:
        typed_data:
          primaryType: SafeTx
          domain:
            chainId: ${chain_id}
            verifyingContract: ${allowed_safe_address_for_testing}
          message:
            to: ${usdc_bridged_address}
            value: '0'
            data: '0x095ea7b3000000000000000000000000d91e80cf2e7be2e162c6513ced06f1dd0da35296ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff'
            operation: '0'
            safeTxGas: '122295'
            baseGas: '0'
            gasPrice: '0'
            gasToken: '0x0000000000000000000000000000000000000000'
            refundReceiver: '0x0000000000000000000000000000000000000000'
