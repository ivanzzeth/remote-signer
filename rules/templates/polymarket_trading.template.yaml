        data: ''
      expect_pass: true
    - name: should pass execTransaction with USDC.e approve to NegRiskExchange (real tx 0x278f1e71)
      input:
        to: ${allowed_safe_address_for_testing}
        data: ''
      expect_pass: true
    - name: should pass execTransaction with CTF setApprovalForAll to Exchange (real tx 0x4f1356ad)
      input:
        to: ${allowed_safe_address_for_testing}
        data: ''
      expect_pass: true
    - name: should pass execTransaction with CTF setApprovalForAll to NegRiskAdapter (real tx 0x80b5400f)
      input:
        to: ${allowed_safe_address_for_testing}
        data: ''
      expect_pass: true
    - name: should pass execTransaction with CTF setApprovalForAll to NegRiskExchange (real tx 0xbdbb5a46)
      input:
        to: ${allowed_safe_address_for_testing}
        data: ''
      expect_pass: true
    - name: should reject execTransaction with non-zero value
      input:
        to: ${allowed_safe_address_for_testing}
        data: ''
      expect_pass: false
      expect_reason: value must be zero
    - name: should reject execTransaction with DELEGATECALL
      input:
        to: ${allowed_safe_address_for_testing}
        data: ''
      expect_pass: false
      expect_reason: only CALL allowed
    - name: should pass execTransaction with real CTF redeemPositions (real tx 0x714b3d)
      input:
        to: ${allowed_safe_address_for_testing}
        data: ''
      expect_pass: true
    - name: should pass execTransaction with CTF splitPosition (real split from BSC 0xe6aa70ec)
      input:
        to: ${allowed_safe_address_for_testing}
        data: ''
      expect_pass: true
    - name: should pass execTransaction with CTF mergePositions (real merge from BSC 0x29661702)
      input:
        to: ${allowed_safe_address_for_testing}
        data: ''
      expect_pass: true
    - name: should reject execTransaction with wrong Safe address
      input:
        to: '0xDEADDEADDEADDEADDEADDEADDEADDEADDEADDEAD'
        data: ''
      expect_pass: false
      expect_reason: txTo must be an allowed Safe wallet
