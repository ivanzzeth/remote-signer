          expect_pass: true
        # ---------------------------------------------------------------
        # Real transaction test cases: splitPosition and mergePositions via execTransaction
        # Source: BSC Opinion txs (identical contract method structure, adapted to BSC addresses)
        # split: BSC tx 0xe6aa70ec0c4945a669552e808b7df17bb2707c4e3542490d2550354f6fc4ebcb
        # merge: BSC tx 0x296617022da1017bd90060ceec4cd84be176ac94cf11a5fbbdc8b39a73b56682
        # redeem: BSC tx 0xff2494c1a89a0e15b71faaf7e38f82296d3dbe0412adf7c7f922596b59deca5c
        # Inner data adapted: collateral changed from BSC USDT to BSC USDT, target changed to BSC CTF
        # ---------------------------------------------------------------
        - name: "should pass execTransaction with CTF splitPosition (real split from BSC 0xe6aa70ec)"
          input:
            to: "${allowed_safe_address_for_testing}"
            data: ""
          expect_pass: true
        - name: "should pass execTransaction with CTF mergePositions (real merge from BSC 0x29661702)"
          input:
            to: "${allowed_safe_address_for_testing}"
            data: ""
          expect_pass: true
        - name: "should reject execTransaction with wrong Safe address"
          input:
            to: "0xDEADDEADDEADDEADDEADDEADDEADDEADDEADDEAD"
            # execTransaction on non-allowed Safe address
            # Generated with: cast calldata "execTransaction(address,uint256,bytes,uint8,uint256,uint256,uint256,address,address,bytes)" ${usdc_bridged_address} 0 0x 0 0 0 0 0x0000000000000000000000000000000000000000 0x0000000000000000000000000000000000000000 0x
            data: ""
          expect_pass: false
          expect_reason: "txTo must be an allowed Safe wallet"
