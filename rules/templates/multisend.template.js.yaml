# Multisend template (evm_js) — allow transactions to multisend contract; decode batch and delegate per item.
# Filename *.template.js.yaml = template fully driven by evm_js rules (no evm_solidity_expression).
# Gnosis MultiSend packed format per tx: operation(1) + to(20) + value(32) + dataLength(32) + data.

variables:
  - name: chain_id
    type: string
    description: "Chain ID (e.g. 1 for mainnet)"
    required: true
  - name: multisend_contract_address
    type: address
    description: "Multisend contract address (tx 'to')"
    required: true
  - name: delegate_to
    type: string
    description: "Target rule ID(s) for per_item delegation. Comma-separated to allow multiple (e.g. ERC20,ERC721); engine tries each until one allows per item."
    required: false
  - name: delegate_mode
    type: string
    description: "Delegation mode: single or per_item (default per_item when delegate_to set)"
    required: false

test_variables:
  chain_id: "1"
  multisend_contract_address: "0xA238CBeb142c10Ef7Ad8442C6D1f9E89e07e7761"
  delegate_to: ""
  delegate_mode: "per_item"

rules:
  - name: "Multisend allowlist and per_item delegation"
    type: "evm_js"
    mode: "whitelist"
    enabled: true
    description: "Allow tx to multisend; decode batch and delegate each item to delegate_to rule"
    config:
      delegate_to: "${delegate_to}"
      delegate_mode: "${delegate_mode}"
      script: |
        function validate(input) {
          if (input.sign_type !== 'transaction') return { valid: false, reason: 'transaction only' };
          if (!input.transaction || !input.transaction.to || input.transaction.data === undefined) return { valid: false, reason: 'missing tx fields' };
          var allowed = config.multisend_contract_address;
          if (!allowed || !isAddress(allowed)) return { valid: false, reason: 'invalid multisend config' };
          if (!eq(toChecksum(input.transaction.to), toChecksum(allowed))) return { valid: false, reason: 'to must be multisend contract' };
          var delegateTo = (config.delegate_to || '').trim();
          if (delegateTo === '' || delegateTo.indexOf('${') === 0) return { valid: true };
          var raw = (input.transaction.data || '0x').replace(/^0x/, '');
          if (raw.length < 8) return { valid: true };
          var multiSendSel = selector('multiSend(bytes)');
          if (!eq('0x' + raw.slice(0, 8), multiSendSel)) return { valid: true };
          var batch = parseMultiSendBatch(raw, input.chain_id, input.signer);
          if (batch.err) return { valid: false, reason: batch.err };
          if (batch.items.length === 0) return { valid: true };
          var mode = (config.delegate_mode || 'per_item').trim();
          if (mode.indexOf('${') === 0) mode = 'per_item';
          return { valid: true, payload: { items: batch.items }, delegate_to: delegateTo, delegate_mode: mode };
        }
        function parseMultiSendBatch(raw, chainId, signer) {
          if (raw.length < 136) return { err: 'calldata too short', items: [] };
          var lenBytes = parseInt(raw.slice(72, 136), 16);
          var batchStart = 136;
          var batchHex = raw.slice(batchStart, batchStart + lenBytes * 2);
          if (batchHex.length !== lenBytes * 2) return { err: 'batch length mismatch', items: [] };
          var items = [];
          var pos = 0;
          while (pos + 170 <= batchHex.length) {
            var op = batchHex.slice(pos, pos + 2);
            pos += 2;
            var toHex = batchHex.slice(pos, pos + 40);
            pos += 40;
            var valueHex = '0x' + batchHex.slice(pos, pos + 64);
            pos += 64;
            var dataLen = parseInt(batchHex.slice(pos, pos + 64), 16);
            pos += 64;
            if (pos + dataLen * 2 > batchHex.length) return { err: 'invalid data length', items: items };
            var dataHex = '0x' + batchHex.slice(pos, pos + dataLen * 2);
            pos += dataLen * 2;
            if (op !== '00') return { err: 'only CALL (0) allowed', items: items };
            var toAddr = '0x' + toHex.slice(24);
            if (!isAddress(toAddr)) return { err: 'invalid to address', items: items };
            items.push({
              sign_type: 'transaction',
              chain_id: chainId,
              signer: signer,
              transaction: { from: signer, to: toAddr, value: valueHex, data: dataHex }
            });
          }
          return { items: items };
        }
    test_cases:
      - name: "should pass when to equals multisend contract"
        input:
          sign_type: "transaction"
          chain_id: 1
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          transaction:
            from: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
            to: "0xA238CBeb142c10Ef7Ad8442C6D1f9E89e07e7761"
            value: "0x0"
            data: "0x"
        expect_pass: true
      - name: "should reject when to differs"
        input:
          sign_type: "transaction"
          chain_id: 1
          signer: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
          transaction:
            from: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
            to: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4"
            value: "0x0"
            data: "0x"
        expect_pass: false
        expect_reason: "to must be multisend contract"
