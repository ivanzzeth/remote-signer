  # NegRiskAdapter operations — splitPosition / mergePositions / redeemPositions / convertPositions
  # Supports both 2-param simplified variants (NegRisk-specific) and 5-param CTF-compatible variants
  - id: "predict-negrisk-adapter-operations"
    name: "Predict NegRiskAdapter Operations"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "${chain_id}"
    description: "Allow NegRiskAdapter operations: 2-param split/merge/redeem (NegRisk-specific), 5-param split/merge (CTF-compatible), and convertPositions"
    config:
      functions: |
        // =====================================================
        // 2-param simplified variants (NegRisk-specific)
        // These have different selectors from the 5-param CTF variants
        // =====================================================

        // splitPosition(bytes32,uint256) — selector: bytes4(keccak256("splitPosition(bytes32,uint256)"))
        function splitPosition(bytes32 _conditionId, uint256 _amount) external {
            // txTo must be one of the 2 NegRiskAdapter contracts
            require(
                txTo == ${neg_risk_adapter_nyb} || // NegRiskAdapter (NYB)
                txTo == ${neg_risk_adapter_yb},   // YB NegRiskAdapter
                "target must be NegRiskAdapter"
            );
            // No additional parameter constraints — conditionId and amount are dynamic
        }

        // mergePositions(bytes32,uint256) — selector: bytes4(keccak256("mergePositions(bytes32,uint256)"))
        function mergePositions(bytes32 _conditionId, uint256 _amount) external {
            // txTo must be one of the 2 NegRiskAdapter contracts
            require(
                txTo == ${neg_risk_adapter_nyb} || // NegRiskAdapter (NYB)
                txTo == ${neg_risk_adapter_yb},   // YB NegRiskAdapter
                "target must be NegRiskAdapter"
            );
            // No additional parameter constraints — conditionId and amount are dynamic
        }

        // redeemPositions(bytes32,uint256[]) — selector: bytes4(keccak256("redeemPositions(bytes32,uint256[])"))
        function redeemPositions(bytes32 _conditionId, uint256[] calldata _amounts) external {
            // txTo must be one of the 2 NegRiskAdapter contracts
            require(
                txTo == ${neg_risk_adapter_nyb} || // NegRiskAdapter (NYB)
                txTo == ${neg_risk_adapter_yb},   // YB NegRiskAdapter
                "target must be NegRiskAdapter"
            );
            // No additional parameter constraints — conditionId and amounts are dynamic
        }

        // =====================================================
        // 5-param CTF-compatible variants
        // Same selectors as CT splitPosition/mergePositions
        // =====================================================

        // splitPosition(address,bytes32,bytes32,uint256[],uint256) — same selector as CT splitPosition
        function splitPosition(address collateralToken, bytes32 parentCollectionId, bytes32 conditionId, uint256[] calldata partition, uint256 amount) external {
            // txTo must be one of the 2 NegRiskAdapter contracts
            require(
                txTo == ${neg_risk_adapter_nyb} || // NegRiskAdapter (NYB)
                txTo == ${neg_risk_adapter_yb},   // YB NegRiskAdapter
                "target must be NegRiskAdapter"
            );
            // collateralToken must be USDT
            require(collateralToken == ${usdt_address}, "collateral must be USDT");
            // parentCollectionId must be zero (root collection)
            require(parentCollectionId == bytes32(0), "parent must be zero");
        }

        // mergePositions(address,bytes32,bytes32,uint256[],uint256) — same selector as CT mergePositions
        function mergePositions(address collateralToken, bytes32 parentCollectionId, bytes32 conditionId, uint256[] calldata partition, uint256 amount) external {
            // txTo must be one of the 2 NegRiskAdapter contracts
            require(
                txTo == ${neg_risk_adapter_nyb} || // NegRiskAdapter (NYB)
                txTo == ${neg_risk_adapter_yb},   // YB NegRiskAdapter
                "target must be NegRiskAdapter"
            );
            // collateralToken must be USDT
            require(collateralToken == ${usdt_address}, "collateral must be USDT");
            // parentCollectionId must be zero (root collection)
            require(parentCollectionId == bytes32(0), "parent must be zero");
        }

        // =====================================================
        // convertPositions — NegRiskAdapter specific
        // =====================================================

        // convertPositions(bytes32,uint256,uint256) — selector: bytes4(keccak256("convertPositions(bytes32,uint256,uint256)"))
        function convertPositions(bytes32 _marketId, uint256 _indexSet, uint256 _amount) external {
            // txTo must be one of the 2 NegRiskAdapter contracts
            require(
                txTo == ${neg_risk_adapter_nyb} || // NegRiskAdapter (NYB)
                txTo == ${neg_risk_adapter_yb},   // YB NegRiskAdapter
                "target must be NegRiskAdapter"
            );
            // No additional parameter constraints — marketId, indexSet, and amount are dynamic
        }
      description: "NegRiskAdapter operations with txTo whitelist and collateral/parent validation for 5-param variants"
      test_cases:
        # ---------------------------------------------------------------
        # 2-param simplified variants: manually constructed test data
        # No real transactions available — these are constructed using
        # correct ABI encoding for the 2-param function signatures
        # ---------------------------------------------------------------
        - name: "should pass NegRiskAdapter 2-param splitPosition on NYB"
          input:
            to: "${neg_risk_adapter_nyb}"
            # splitPosition(bytes32,uint256): selector=0xa3d7da1d
            # conditionId=0x01f023b3..., amount=1000000000000000000
            data: "0xa3d7da1d01f023b3b6a1f1e2a4ca958131d7094933e5f38781a12db9935404f59278278d0000000000000000000000000000000000000000000000000de0b6b3a7640000"
