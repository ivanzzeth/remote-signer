              side: "0"
              signatureType: "1"
        expect_pass: false
        expect_reason: "signatureType must be EOA"

  - id: "predict-ct-split-merge-redeem"
    name: "Predict CT Split Merge Redeem"
    type: "evm_js"
    mode: "whitelist"
    enabled: true
    chain_id: "${chain_id}"
    description: "Allow splitPosition, mergePositions, redeemPositions on ConditionalTokens (NYB + YB) with collateral=USDT and parentCollectionId=0"
    config:
      sign_type_filter: "transaction"
      script: |
        function validate(input) {
          var ctx = rs.tx.require(input);
          var ctTargets = [config.ct_nyb, config.ct_yb];
          require(rs.addr.inList(ctx.tx.to, ctTargets), 'target must be ConditionalTokens');
          var splitSel = selector('splitPosition(address,bytes32,bytes32,uint256[],uint256)');
          var mergeSel = selector('mergePositions(address,bytes32,bytes32,uint256[],uint256)');
          var redeemSel = selector('redeemPositions(address,bytes32,bytes32,uint256[])');
          var usdt = toChecksum(config.usdt_address);
          if (eq(ctx.selector, splitSel)) return validate5Param(ctx.payloadHex, usdt);
          if (eq(ctx.selector, mergeSel)) return validate5Param(ctx.payloadHex, usdt);
          if (eq(ctx.selector, redeemSel)) return validateRedeem(ctx.payloadHex, usdt);
          revert('only splitPosition, mergePositions, redeemPositions allowed');
        }
        function validate5Param(payloadHex, usdt) {
          var dec = abi.decode(payloadHex, ['address', 'bytes32', 'bytes32', 'uint256[]', 'uint256']);
          require(dec && dec.length === 5, 'decode failed');
          var collateral = (dec[0] || '').toString().trim();
          require(rs.addr.inList(collateral, [usdt]), 'collateral must be USDT');
          return ok();
        }
        function validateRedeem(payloadHex, usdt) {
          var dec = abi.decode(payloadHex, ['address', 'bytes32', 'bytes32', 'uint256[]']);
          require(dec && dec.length === 4, 'decode failed');
          var collateral = (dec[0] || '').toString().trim();
          require(rs.addr.inList(collateral, [usdt]), 'collateral must be USDT');
          return ok();
        }
    test_cases:
      - name: "should pass YB CT mergePositions (real tx nonce=14, 0xec080930)"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${ct_yb}"
            value: "0x0"
            data: ""
        expect_pass: true
      - name: "should pass YB CT mergePositions (real tx nonce=15, 0x550f3d81)"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${ct_yb}"
            value: "0x0"
            data: ""
        expect_pass: true
      - name: "should pass YB CT redeemPositions (real tx nonce=20, 0x77c60894)"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${ct_yb}"
            value: "0x0"
            data: ""
        expect_pass: true
      - name: "should reject mergePositions with non-USDT collateral"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${ct_yb}"
            value: "0x0"
            data: ""
        expect_pass: false
        expect_reason: "collateral must be USDT"
      - name: "should reject mergePositions on non-whitelisted target"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "0xDEADDEADDEADDEADDEADDEADDEADDEADDEADDEAD"
            value: "0x0"
            data: ""
        expect_pass: false
        expect_reason: "target must be ConditionalTokens"

  - id: "predict-negrisk-adapter-operations"
    name: "Predict NegRiskAdapter Operations"
    type: "evm_js"
    mode: "whitelist"
    enabled: true
    chain_id: "${chain_id}"
    description: "Allow NegRiskAdapter operations: 2-param split/merge/redeem, 5-param split/merge (CTF-compatible), and convertPositions"
    config:
      sign_type_filter: "transaction"
      script: |
        function validate(input) {
          var ctx = rs.tx.require(input);
          var adapterTargets = [config.neg_risk_adapter_nyb, config.neg_risk_adapter_yb];
          require(rs.addr.inList(ctx.tx.to, adapterTargets), 'target must be NegRiskAdapter');
          var split2 = selector('splitPosition(bytes32,uint256)');
          var merge2 = selector('mergePositions(bytes32,uint256)');
          var redeem2 = selector('redeemPositions(bytes32,uint256[])');
          var split5 = selector('splitPosition(address,bytes32,bytes32,uint256[],uint256)');
          var merge5 = selector('mergePositions(address,bytes32,bytes32,uint256[],uint256)');
          var convert = selector('convertPositions(bytes32,uint256,uint256)');
          if (eq(ctx.selector, split2) || eq(ctx.selector, merge2) || eq(ctx.selector, redeem2)) return ok();
          if (eq(ctx.selector, convert)) return ok();
          if (eq(ctx.selector, split5) || eq(ctx.selector, merge5)) return validate5Param(ctx.payloadHex);
          revert('unknown NegRiskAdapter method');
        }
        function validate5Param(payloadHex) {
          var dec = abi.decode(payloadHex, ['address', 'bytes32', 'bytes32', 'uint256[]', 'uint256']);
          require(dec && dec.length === 5, 'decode failed');
          var usdt = toChecksum(config.usdt_address);
          var collateral = (dec[0] || '').toString().trim();
          require(rs.addr.inList(collateral, [usdt]), 'collateral must be USDT');
          return ok();
        }
    test_cases:
      - name: "should pass NegRiskAdapter 2-param splitPosition on NYB"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${neg_risk_adapter_nyb}"
            value: "0x0"
            data: "0xa3d7da1d01f023b3b6a1f1e2a4ca958131d7094933e5f38781a12db9935404f59278278d0000000000000000000000000000000000000000000000000de0b6b3a7640000"
        expect_pass: true
      - name: "should pass NegRiskAdapter 2-param mergePositions on YB"
