# Predict.fun Trading (evm_js) — Order + split/merge/redeem + NegRiskAdapter.
# Same logic as predict_trading.template.yaml but uses evm_js for faster validation (no Forge).

variables:
  - name: chain_id
    type: string
    description: "Chain ID (e.g. 56 for BNB Chain)"
    required: true
  - name: order_domain_name
    type: string
    description: "EIP-712 Order domain name (e.g. predict.fun CTF Exchange)"
    required: true
  - name: order_domain_version
    type: string
    description: "EIP-712 Order domain version"
    required: true
  - name: usdt_address
    type: address
    description: "USDT token address"
    required: true
  - name: ct_nyb
    type: address
    description: "ConditionalTokens (NYB) contract address"
    required: true
  - name: ct_yb
    type: address
    description: "YieldBearing ConditionalTokens contract address"
    required: true
  - name: neg_risk_adapter_nyb
    type: address
    description: "NegRiskAdapter (NYB) contract address"
    required: true
  - name: neg_risk_adapter_yb
    type: address
    description: "NegRiskAdapter (YB) contract address"
    required: true
  - name: ctf_exchange_nyb
    type: address
    description: "CTFExchange (NYB) contract address"
    required: true
  - name: neg_risk_exchange_nyb
    type: address
    description: "NegRiskExchange (NYB) contract address"
    required: true
  - name: ctf_exchange_yb
    type: address
    description: "CTFExchange (YB) contract address"
    required: true
  - name: neg_risk_exchange_yb
    type: address
    description: "NegRiskExchange (YB) contract address"
    required: true
  - name: signer_address_for_testing
    type: address
    description: "EOA signer address for test payloads (maker, signer, etc.)"
    required: true

test_variables:
  chain_id: "56"
  order_domain_name: "predict.fun CTF Exchange"
  order_domain_version: "1"
  usdt_address: "0x55d398326f99059fF775485246999027B3197955"
  ct_nyb: "0x22DA1810B194ca018378464a58f6Ac2B10C9d244"
  ct_yb: "0x9400F8Ad57e9e0F352345935d6D3175975eb1d9F"
  neg_risk_adapter_nyb: "0xc3Cf7c252f65E0d8D88537dF96569AE94a7F1A6E"
  neg_risk_adapter_yb: "0x41dCe1A4B8FB5e6327701750aF6231B7CD0B2A40"
  ctf_exchange_nyb: "0x8BC070BEdAB741406F4B1Eb65A72bee27894B689"
  neg_risk_exchange_nyb: "0x365fb81bd4A24D6303cd2F19c349dE6894D8d58A"
  ctf_exchange_yb: "0x6bEb5a40C032AFc305961162d8204CDA16DECFa5"
  neg_risk_exchange_yb: "0x8A289d458f5a134bA40015085A8F50Ffb681B41d"
  signer_address_for_testing: "0x53c68c954f85a29d2098e90addaf41baf2ff0a50"

rules:
  - id: "predict-order-signature"
    name: "Predict Order Signature"
    type: "evm_js"
    mode: "whitelist"
    enabled: true
    chain_id: "${chain_id}"
    description: "Validate Predict.fun CTF Exchange order signatures. Supports 4 Exchange contracts."
    config:
      sign_type_filter: "typed_data"
      script: |
        function validate(input) {
          var ctx = rs.typedData.require(input, 'Order');
          var domain = ctx.domain || {};
          var msg = ctx.message || {};
          var allowedContracts = [config.ctf_exchange_nyb, config.neg_risk_exchange_nyb, config.ctf_exchange_yb, config.neg_risk_exchange_yb];
          rs.typedData.requireDomain(domain, {
            name: config.order_domain_name,
            version: config.order_domain_version,
            chainId: parseInt(config.chain_id, 10),
            allowedContracts: allowedContracts
          });
          rs.addr.requireZero((msg.taker || '').trim(), 'taker must be zero address');
          require(isAddress((input.signer || '').trim()), 'invalid signer');
          rs.typedData.requireSignerMatch((msg.signer || '').trim(), (input.signer || '').trim(), 'order signer must match signing key');
          rs.int.requireLte(msg.feeRateBps, 1000, 'fee exceeds 10%');
          rs.int.requireEq(msg.signatureType, 0, 'signatureType must be EOA');
          return ok();
        }
    test_cases:
      - name: "should pass valid order on CTFExchange (NYB)"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${ctf_exchange_nyb}"
            message:
              salt: "12345"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "1"
              makerAmount: "1000000000000000000"
              takerAmount: "1000000000000000000"
              expiration: "1893456000"
              nonce: "0"
              feeRateBps: "100"
              side: "0"
              signatureType: "0"
        expect_pass: true
      - name: "should reject invalid domain name"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "WrongDomain"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${ctf_exchange_nyb}"
            message:
              salt: "12345"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "1"
              makerAmount: "1000000000000000000"
              takerAmount: "1000000000000000000"
              expiration: "1893456000"
              nonce: "0"
              feeRateBps: "100"
              side: "0"
              signatureType: "0"
        expect_pass: false
        expect_reason: "invalid domain name"
      - name: "should reject fee exceeding 10%"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${ctf_exchange_nyb}"
            message:
              salt: "12345"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "1"
              makerAmount: "1000000000000000000"
              takerAmount: "1000000000000000000"
              expiration: "1893456000"
              nonce: "0"
              feeRateBps: "1001"
              side: "0"
              signatureType: "0"
        expect_pass: false
        expect_reason: "fee exceeds 10%"
      - name: "should pass valid order on NegRiskExchange (NYB)"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${neg_risk_exchange_nyb}"
            message:
              salt: "67890"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "2"
              makerAmount: "5000000000000000000"
              takerAmount: "5000000000000000000"
              expiration: "1893456000"
              nonce: "1"
              feeRateBps: "200"
              side: "1"
              signatureType: "0"
        expect_pass: true
      - name: "should pass valid order on YB CTFExchange"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
