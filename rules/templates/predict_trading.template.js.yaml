# Predict.fun Trading (evm_js) — Order + split/merge/redeem + NegRiskAdapter.
# Same logic as predict_trading.template.yaml but uses evm_js for faster validation (no Forge).

variables:
  - name: chain_id
    type: string
    description: "Chain ID (e.g. 56 for BNB Chain)"
    required: true
  - name: order_domain_name
    type: string
    description: "EIP-712 Order domain name (e.g. predict.fun CTF Exchange)"
    required: true
  - name: order_domain_version
    type: string
    description: "EIP-712 Order domain version"
    required: true
  - name: usdt_address
    type: address
    description: "USDT token address"
    required: true
  - name: ct_nyb
    type: address
    description: "ConditionalTokens (NYB) contract address"
    required: true
  - name: ct_yb
    type: address
    description: "YieldBearing ConditionalTokens contract address"
    required: true
  - name: neg_risk_adapter_nyb
    type: address
    description: "NegRiskAdapter (NYB) contract address"
    required: true
  - name: neg_risk_adapter_yb
    type: address
    description: "NegRiskAdapter (YB) contract address"
    required: true
  - name: ctf_exchange_nyb
    type: address
    description: "CTFExchange (NYB) contract address"
    required: true
  - name: neg_risk_exchange_nyb
    type: address
    description: "NegRiskExchange (NYB) contract address"
    required: true
  - name: ctf_exchange_yb
    type: address
    description: "CTFExchange (YB) contract address"
    required: true
  - name: neg_risk_exchange_yb
    type: address
    description: "NegRiskExchange (YB) contract address"
    required: true
  - name: signer_address_for_testing
    type: address
    description: "EOA signer address for test payloads (maker, signer, etc.)"
    required: true

test_variables:
  chain_id: "56"
  order_domain_name: "predict.fun CTF Exchange"
  order_domain_version: "1"
  usdt_address: "0x55d398326f99059fF775485246999027B3197955"
  ct_nyb: "0x22DA1810B194ca018378464a58f6Ac2B10C9d244"
  ct_yb: "0x9400F8Ad57e9e0F352345935d6D3175975eb1d9F"
  neg_risk_adapter_nyb: "0xc3Cf7c252f65E0d8D88537dF96569AE94a7F1A6E"
  neg_risk_adapter_yb: "0x41dCe1A4B8FB5e6327701750aF6231B7CD0B2A40"
  ctf_exchange_nyb: "0x8BC070BEdAB741406F4B1Eb65A72bee27894B689"
  neg_risk_exchange_nyb: "0x365fb81bd4A24D6303cd2F19c349dE6894D8d58A"
  ctf_exchange_yb: "0x6bEb5a40C032AFc305961162d8204CDA16DECFa5"
  neg_risk_exchange_yb: "0x8A289d458f5a134bA40015085A8F50Ffb681B41d"
  signer_address_for_testing: "0x53c68c954f85a29d2098e90addaf41baf2ff0a50"

rules:
  - id: "predict-order-signature"
    name: "Predict Order Signature"
    type: "evm_js"
    mode: "whitelist"
    enabled: true
    chain_id: "${chain_id}"
    description: "Validate Predict.fun CTF Exchange order signatures. Supports 4 Exchange contracts."
    config:
      sign_type_filter: "typed_data"
      script: |
        function validate(input) {
          if (input.sign_type !== 'typed_data') return fail('sign_type must be typed_data');
          var td = input.typed_data;
          if (!td || td.primaryType !== 'Order') return fail('not Order');
          var domain = td.domain || {};
          var msg = td.message || {};
          var wantName = (config.order_domain_name || '').trim();
          var wantVersion = (config.order_domain_version || '').trim();
          var allowedContracts = [config.ctf_exchange_nyb, config.neg_risk_exchange_nyb, config.ctf_exchange_yb, config.neg_risk_exchange_yb];
          var chainId = parseInt(config.chain_id, 10);
          if (String(domain.name || '').trim() !== wantName) return fail('invalid domain name');
          if (String(domain.version || '').trim() !== wantVersion) return fail('invalid domain version');
          if (Number(domain.chainId) !== chainId) return fail('must be on configured chain');
          if (!isAddress(domain.verifyingContract)) return fail('invalid verifying contract');
          var vc = toChecksum(domain.verifyingContract);
          if (!inSet(vc, allowedContracts)) return fail('invalid verifying contract');
          var zeroAddr = '0x0000000000000000000000000000000000000000';
          if (!eq(toChecksum((msg.taker || '').trim()), zeroAddr)) return fail('taker must be zero address');
          var signerAddr = toChecksum((input.signer || '').trim());
          if (!isAddress(signerAddr)) return fail('invalid signer');
          if (!eq(toChecksum((msg.signer || '').trim()), signerAddr)) return fail('order signer must match signing key');
          var feeBps = parseInt(msg.feeRateBps, 10) || 0;
          if (feeBps > 1000) return fail('fee exceeds 10%');
          var sigType = parseInt(msg.signatureType, 10);
          if (sigType !== 0) return fail('signatureType must be EOA');
          return ok();
        }
        function inSet(addr, set) {
          var c = toChecksum((addr || '').trim());
          for (var i = 0; i < set.length; i++) { if (eq(c, toChecksum((set[i] || '').trim()))) return true; }
          return false;
        }
    test_cases:
      - name: "should pass valid order on CTFExchange (NYB)"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${ctf_exchange_nyb}"
            message:
              salt: "12345"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "1"
              makerAmount: "1000000000000000000"
              takerAmount: "1000000000000000000"
              expiration: "1893456000"
              nonce: "0"
              feeRateBps: "100"
              side: "0"
              signatureType: "0"
        expect_pass: true
      - name: "should reject invalid domain name"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "WrongDomain"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${ctf_exchange_nyb}"
            message:
              salt: "12345"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "1"
              makerAmount: "1000000000000000000"
              takerAmount: "1000000000000000000"
              expiration: "1893456000"
              nonce: "0"
              feeRateBps: "100"
              side: "0"
              signatureType: "0"
        expect_pass: false
        expect_reason: "invalid domain name"
      - name: "should reject fee exceeding 10%"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${ctf_exchange_nyb}"
            message:
              salt: "12345"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "1"
              makerAmount: "1000000000000000000"
              takerAmount: "1000000000000000000"
              expiration: "1893456000"
              nonce: "0"
              feeRateBps: "1001"
              side: "0"
              signatureType: "0"
        expect_pass: false
        expect_reason: "fee exceeds 10%"
      - name: "should pass valid order on NegRiskExchange (NYB)"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${neg_risk_exchange_nyb}"
            message:
              salt: "67890"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "2"
              makerAmount: "5000000000000000000"
              takerAmount: "5000000000000000000"
              expiration: "1893456000"
              nonce: "1"
              feeRateBps: "200"
              side: "1"
              signatureType: "0"
        expect_pass: true
      - name: "should pass valid order on YB CTFExchange"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${ctf_exchange_yb}"
            message:
              salt: "11111"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "3"
              makerAmount: "2000000000000000000"
              takerAmount: "2000000000000000000"
              expiration: "1893456000"
              nonce: "2"
              feeRateBps: "50"
              side: "0"
              signatureType: "0"
        expect_pass: true
      - name: "should pass valid order on YB NegRiskExchange"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${neg_risk_exchange_yb}"
            message:
              salt: "22222"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "4"
              makerAmount: "3000000000000000000"
              takerAmount: "3000000000000000000"
              expiration: "1893456000"
              nonce: "3"
              feeRateBps: "150"
              side: "1"
              signatureType: "0"
        expect_pass: true
      - name: "should reject wrong chainId"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "137"
              verifyingContract: "${ctf_exchange_nyb}"
            message:
              salt: "12345"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "1"
              makerAmount: "1000000000000000000"
              takerAmount: "1000000000000000000"
              expiration: "1893456000"
              nonce: "0"
              feeRateBps: "100"
              side: "0"
              signatureType: "0"
        expect_pass: false
        expect_reason: "must be on configured chain"
      - name: "should reject invalid verifying contract"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "0xDEADDEADDEADDEADDEADDEADDEADDEADDEADDEAD"
            message:
              salt: "12345"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "1"
              makerAmount: "1000000000000000000"
              takerAmount: "1000000000000000000"
              expiration: "1893456000"
              nonce: "0"
              feeRateBps: "100"
              side: "0"
              signatureType: "0"
        expect_pass: false
        expect_reason: "invalid verifying contract"
      - name: "should reject non-zero taker"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${ctf_exchange_nyb}"
            message:
              salt: "12345"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x1111111111111111111111111111111111111111"
              tokenId: "1"
              makerAmount: "1000000000000000000"
              takerAmount: "1000000000000000000"
              expiration: "1893456000"
              nonce: "0"
              feeRateBps: "100"
              side: "0"
              signatureType: "0"
        expect_pass: false
        expect_reason: "taker must be zero address"
      - name: "should reject signer mismatch"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${ctf_exchange_nyb}"
            message:
              salt: "12345"
              maker: "${signer_address_for_testing}"
              signer: "0xDEADDEADDEADDEADDEADDEADDEADDEADDEADDEAD"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "1"
              makerAmount: "1000000000000000000"
              takerAmount: "1000000000000000000"
              expiration: "1893456000"
              nonce: "0"
              feeRateBps: "100"
              side: "0"
              signatureType: "0"
        expect_pass: false
        expect_reason: "order signer must match signing key"
      - name: "should reject non-EOA signatureType"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${ctf_exchange_nyb}"
            message:
              salt: "12345"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "1"
              makerAmount: "1000000000000000000"
              takerAmount: "1000000000000000000"
              expiration: "1893456000"
              nonce: "0"
              feeRateBps: "100"
              side: "0"
              signatureType: "1"
        expect_pass: false
        expect_reason: "signatureType must be EOA"

  - id: "predict-ct-split-merge-redeem"
    name: "Predict CT Split Merge Redeem"
    type: "evm_js"
    mode: "whitelist"
    enabled: true
    chain_id: "${chain_id}"
    description: "Allow splitPosition, mergePositions, redeemPositions on ConditionalTokens (NYB + YB) with collateral=USDT and parentCollectionId=0"
    config:
      sign_type_filter: "transaction"
      script: |
        function validate(input) {
          if (input.sign_type !== 'transaction') return fail('transaction only');
          var tx = input.transaction;
          if (!tx || !tx.to || tx.data === undefined) return fail('missing tx fields');
          var txTo = toChecksum((tx.to || '').trim());
          var ctTargets = [config.ct_nyb, config.ct_yb];
          var targetOk = false;
          for (var i = 0; i < ctTargets.length; i++) {
            if (eq(txTo, toChecksum((ctTargets[i] || '').trim()))) { targetOk = true; break; }
          }
          if (!targetOk) return fail('target must be ConditionalTokens');
          var dataHex = (tx.data || '0x').replace(/^0x/, '');
          if (dataHex.length < 8) return fail('calldata too short');
          var sel = '0x' + dataHex.slice(0, 8);
          var splitSel = selector('splitPosition(address,bytes32,bytes32,uint256[],uint256)');
          var mergeSel = selector('mergePositions(address,bytes32,bytes32,uint256[],uint256)');
          var redeemSel = selector('redeemPositions(address,bytes32,bytes32,uint256[])');
          var usdt = toChecksum((config.usdt_address || '').trim());
          var payload = '0x' + dataHex.slice(8);
          if (eq(sel, splitSel)) return validate5Param(payload, usdt);
          if (eq(sel, mergeSel)) return validate5Param(payload, usdt);
          if (eq(sel, redeemSel)) return validateRedeem(payload, usdt);
          return fail('only splitPosition, mergePositions, redeemPositions allowed');
        }
        function validate5Param(payloadHex, usdt) {
          var dec = abi.decode(payloadHex, ['address', 'bytes32', 'bytes32', 'uint256[]', 'uint256']);
          if (!dec || dec.length !== 5) return fail('decode failed');
          var collateral = toChecksum((dec[0] || '').trim());
          if (!eq(collateral, usdt)) return fail('collateral must be USDT');
          return ok();
        }
        function validateRedeem(payloadHex, usdt) {
          var dec = abi.decode(payloadHex, ['address', 'bytes32', 'bytes32', 'uint256[]']);
          if (!dec || dec.length !== 4) return fail('decode failed');
          var collateral = toChecksum((dec[0] || '').trim());
          if (!eq(collateral, usdt)) return fail('collateral must be USDT');
          return ok();
        }
    test_cases:
      - name: "should pass YB CT mergePositions (real tx nonce=14, 0xec080930)"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${ct_yb}"
            value: "0x0"
            data: ""
        expect_pass: true
      - name: "should pass YB CT mergePositions (real tx nonce=15, 0x550f3d81)"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${ct_yb}"
            value: "0x0"
            data: ""
        expect_pass: true
      - name: "should pass YB CT redeemPositions (real tx nonce=20, 0x77c60894)"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${ct_yb}"
            value: "0x0"
            data: ""
        expect_pass: true
      - name: "should reject mergePositions with non-USDT collateral"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${ct_yb}"
            value: "0x0"
            data: ""
        expect_pass: false
        expect_reason: "collateral must be USDT"
      - name: "should reject mergePositions on non-whitelisted target"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "0xDEADDEADDEADDEADDEADDEADDEADDEADDEADDEAD"
            value: "0x0"
            data: ""
        expect_pass: false
        expect_reason: "target must be ConditionalTokens"

  - id: "predict-negrisk-adapter-operations"
    name: "Predict NegRiskAdapter Operations"
    type: "evm_js"
    mode: "whitelist"
    enabled: true
    chain_id: "${chain_id}"
    description: "Allow NegRiskAdapter operations: 2-param split/merge/redeem, 5-param split/merge (CTF-compatible), and convertPositions"
    config:
      sign_type_filter: "transaction"
      script: |
        function validate(input) {
          if (input.sign_type !== 'transaction') return fail('transaction only');
          var tx = input.transaction;
          if (!tx || !tx.to || tx.data === undefined) return fail('missing tx fields');
          var txTo = toChecksum((tx.to || '').trim());
          var adapterTargets = [config.neg_risk_adapter_nyb, config.neg_risk_adapter_yb];
          var targetOk = false;
          for (var i = 0; i < adapterTargets.length; i++) {
            if (eq(txTo, toChecksum((adapterTargets[i] || '').trim()))) { targetOk = true; break; }
          }
          if (!targetOk) return fail('target must be NegRiskAdapter');
          var dataHex = (tx.data || '0x').replace(/^0x/, '');
          if (dataHex.length < 8) return fail('calldata too short');
          var sel = '0x' + dataHex.slice(0, 8);
          var payloadHex = '0x' + dataHex.slice(8);
          var split2 = selector('splitPosition(bytes32,uint256)');
          var merge2 = selector('mergePositions(bytes32,uint256)');
          var redeem2 = selector('redeemPositions(bytes32,uint256[])');
          var split5 = selector('splitPosition(address,bytes32,bytes32,uint256[],uint256)');
          var merge5 = selector('mergePositions(address,bytes32,bytes32,uint256[],uint256)');
          var convert = selector('convertPositions(bytes32,uint256,uint256)');
          if (eq(sel, split2) || eq(sel, merge2) || eq(sel, redeem2)) return ok();
          if (eq(sel, convert)) return ok();
          if (eq(sel, split5) || eq(sel, merge5)) return validate5Param(payloadHex);
          return fail('unknown NegRiskAdapter method');
        }
        function validate5Param(payloadHex) {
          var dec = abi.decode(payloadHex, ['address', 'bytes32', 'bytes32', 'uint256[]', 'uint256']);
          if (!dec || dec.length !== 5) return fail('decode failed');
          var usdt = toChecksum((config.usdt_address || '').trim());
          var collateral = toChecksum((dec[0] || '').trim());
          if (!eq(collateral, usdt)) return fail('collateral must be USDT');
          return ok();
        }
    test_cases:
      - name: "should pass NegRiskAdapter 2-param splitPosition on NYB"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${neg_risk_adapter_nyb}"
            value: "0x0"
            data: "0xa3d7da1d01f023b3b6a1f1e2a4ca958131d7094933e5f38781a12db9935404f59278278d0000000000000000000000000000000000000000000000000de0b6b3a7640000"
        expect_pass: true
      - name: "should pass NegRiskAdapter 2-param mergePositions on YB"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${neg_risk_adapter_yb}"
            value: "0x0"
            data: "0xb10c5c1701f023b3b6a1f1e2a4ca958131d7094933e5f38781a12db9935404f59278278d0000000000000000000000000000000000000000000000001bc16d674ec80000"
        expect_pass: true
      - name: "should pass NegRiskAdapter 2-param redeemPositions on NYB"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${neg_risk_adapter_nyb}"
            value: "0x0"
            data: ""
        expect_pass: true
      - name: "should pass NegRiskAdapter 5-param splitPosition on NYB"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${neg_risk_adapter_nyb}"
            value: "0x0"
            data: ""
        expect_pass: true
      - name: "should pass NegRiskAdapter 5-param mergePositions on YB"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${neg_risk_adapter_yb}"
            value: "0x0"
            data: ""
        expect_pass: true
      - name: "should pass NegRiskAdapter convertPositions on NYB"
        input:
          sign_type: "transaction"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          transaction:
            from: "${signer_address_for_testing}"
            to: "${neg_risk_adapter_nyb}"
            value: "0x0"
