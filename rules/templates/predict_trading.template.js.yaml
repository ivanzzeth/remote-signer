            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${ctf_exchange_yb}"
            message:
              salt: "11111"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "3"
              makerAmount: "2000000000000000000"
              takerAmount: "2000000000000000000"
              expiration: "1893456000"
              nonce: "2"
              feeRateBps: "50"
              side: "0"
              signatureType: "0"
        expect_pass: true
      - name: "should pass valid order on YB NegRiskExchange"
        input:
          sign_type: "typed_data"
          chain_id: "56"
          signer: "${signer_address_for_testing}"
          typed_data:
            primaryType: "Order"
            domain:
              name: "${order_domain_name}"
              version: "${order_domain_version}"
              chainId: "${chain_id}"
              verifyingContract: "${neg_risk_exchange_yb}"
            message:
              salt: "22222"
              maker: "${signer_address_for_testing}"
              signer: "${signer_address_for_testing}"
              taker: "0x0000000000000000000000000000000000000000"
              tokenId: "4"
              makerAmount: "3000000000000000000"
              takerAmount: "3000000000000000000"
              expiration: "1893456000"
              nonce: "3"
              feeRateBps: "150"
