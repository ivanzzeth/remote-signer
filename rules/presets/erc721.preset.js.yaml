# Preset: ERC721 transfer/approve allowlists (evm_js).
# Use: remote-signer-cli preset create-from erc721.preset.js.yaml [--config config.yaml --write] [--set chain_id=1 --set token_address=0x...]

name: "ERC721 (JS)"
template_paths:
  - "rules/templates/erc721.template.js.yaml"
template_names:
  - "ERC721 Template"
chain_type: "evm"
chain_id: "1"
enabled: true
variables:
  chain_id: "1"
  token_address: "0xBC4ca0EdA7647A8aB7C2061c2E118A18a936f13D"
  allowed_recipients: ""
  allowed_transfer_from: ""
  allowed_approve_to: ""
  allowed_operators: ""
override_hints:
  - chain_id
  - token_address
  - allowed_recipients
  - allowed_transfer_from
  - allowed_approve_to
  - allowed_operators
