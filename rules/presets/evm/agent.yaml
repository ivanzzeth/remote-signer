# Preset: Agent (evm_js) — AI agent with simulation-based budget tracking.
# Composes evm/agent (sign + safety) with ERC20/ERC721/ERC1155 auth templates so
# on-chain approve/setApprovalForAll to trusted_contracts auto-approve.
# Other transactions fall through to SimulationBudgetRule (simulation + budget).
#
# No chain_id restriction — agent can interact with ANY chain.
#
# Usage:
#   remote-signer-cli preset create-from agent.preset.js.yaml \
#     --set max_native_total=1 --set max_native_per_tx=0.1 \
#     --set max_unknown_token_total=1000 \
#     --set trusted_contracts=0xRouter,0xBridge \
#     --config config.yaml --write

name: "Agent"
chain_type: "evm"
# No chain_id — matches ALL chains. Budget isolates per chain automatically.
enabled: true
variables:
  max_message_length: "1024"
  budget_period: "24h"
  max_native_total: "1"
  max_native_per_tx: "0.1"
  max_tx_count: "1000"
  max_sign_count: "500"
  max_unknown_token_total: "1000"
  max_unknown_token_per_tx: "100"
  max_unknown_token_tx_count: "50"
  # Unified trust list: Permit/typed_data (agent-sign) + ERC20 approve spender +
  # ERC721 approve/setApprovalForAll + ERC1155 setApprovalForAll.
  trusted_contracts: ""
  # ERC20 composite (evm/erc20 template)
  token_address: ""
  allowed_spenders: ""
  allowed_recipients: ""
  allowed_transfer_from: ""
  max_transfer_amount: "0"
  max_approve_amount: "-1"
  # ERC721 / ERC1155 composite
  allowed_approve_to: ""
  allowed_operators: ""
  auth_only: "true"
budget:
  dynamic: true
  unit_decimal: true
  known_units:
    native:
      max_total: "${max_native_total}"
      max_per_tx: "${max_native_per_tx}"
      decimals: 18
    tx_count:
      max_total: "${max_tx_count}"
      max_per_tx: "1"
      decimals: 0
    sign_count:
      max_total: "${max_sign_count}"
      max_per_tx: "1"
      decimals: 0
  unknown_default:
    max_total: "${max_unknown_token_total}"
    max_per_tx: "${max_unknown_token_per_tx}"
    max_tx_count: "${max_unknown_token_tx_count}"
  period: "${budget_period}"
  alert_pct: 80
schedule:
  period: "${budget_period}"
template_ids:
  - evm/agent
  - evm/erc20
  - evm/erc721
  - evm/erc1155
operator_overrides:
  - name: max_message_length
    required: false
  - name: budget_period
    required: false
  - name: max_native_total
    required: false
  - name: max_native_per_tx
    required: false
  - name: max_tx_count
    required: false
  - name: max_sign_count
    required: false
  - name: max_unknown_token_total
    required: false
  - name: max_unknown_token_per_tx
    required: false
  - name: max_unknown_token_tx_count
    required: false
  - name: trusted_contracts
    required: false
  - name: token_address
    required: false
  - name: allowed_spenders
    required: false
  - name: allowed_recipients
    required: false
  - name: allowed_transfer_from
    required: false
  - name: max_transfer_amount
    required: false
  - name: max_approve_amount
    required: false
  - name: allowed_approve_to
    required: false
  - name: allowed_operators
    required: false
  - name: auth_only
    required: false
