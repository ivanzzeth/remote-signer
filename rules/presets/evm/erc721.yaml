# Preset: ERC721 transfer/approve allowlists (evm_js).
# Use: remote-signer-cli preset create-from erc721.preset.js.yaml [--config config.yaml --write] [--set chain_id=1 --set token_address=0x...]

name: "ERC721 (JS)"
chain_type: "evm"
chain_id: "1"
enabled: true
variables:
  token_address: "0xBC4ca0EdA7647A8aB7C2061c2E118A18a936f13D"
  allowed_recipients: ""
  allowed_transfer_from: ""
  allowed_approve_to: ""
  allowed_operators: ""
template_ids:
  - evm/erc721
operator_overrides:
  - name: token_address
    required: false
  - name: allowed_recipients
    required: false
  - name: allowed_transfer_from
    required: false
  - name: allowed_approve_to
    required: false
  - name: allowed_operators
    required: false
