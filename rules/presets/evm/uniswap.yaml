# Preset: Uniswap (swap + approve + WETH + Permit2) across major EVM chains.
# Single rule with per-chain Matrix overrides for router addresses, WETH, and tokens.
#
# Usage:
#   remote-signer-cli preset create-from uniswap --config config.yaml --write
#
# The rule-level Variables hold sensible defaults; Matrix rows override per-chain_id
# at evaluation time. One rule covers all chains.
#
# Address sources:
#   V2 Router: https://docs.uniswap.org/contracts/v2/reference/smart-contracts/router-02
#   V3 SwapRouter: https://docs.uniswap.org/contracts/v3/reference/deployments
#   V4 UniversalRouter: https://docs.uniswap.org/contracts/v4/deployments
#   Permit2: https://docs.uniswap.org/contracts/permit2/reference/deployments

