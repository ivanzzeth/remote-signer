# Preset: EIP-1559 Fee Guard (evm_js). Blocklist mode — blocks transactions exceeding gas limit or value cap.
# Use: remote-signer-cli preset create-from eip1559_fee_guard.preset.js.yaml [--config config.yaml --write] [--set max_gas=500000 --set max_value=1000000000000000000]

name: "EIP-1559 Fee Guard (JS)"
template_paths:
  - "rules/templates/eip1559_fee_guard.template.js.yaml"
template_names:
  - "EIP-1559 Fee Guard Template"
chain_type: "evm"
chain_id: "1"
enabled: true
variables:
  chain_id: "1"
  max_gas: "500000"
  max_value: "-1"
override_hints:
  - chain_id
  - max_gas
  - max_value
