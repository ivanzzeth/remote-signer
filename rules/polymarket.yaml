      functions: |
        // ConditionalTokens on Polygon: 0x4D97DCd97eC945f40cF65F87097ACe5EA0476045
        function setApprovalForAll(address operator, bool approved) external {
            // NegRiskAdapter
            require(
                operator == 0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296,
                "operator must be NegRiskAdapter"
            );
        }
      description: "CTF ERC1155 approval for NegRiskAdapter"

  # CTF setApprovalForAll to NegRiskExchange
  - name: "Polymarket CTF Approve NegRiskExchange"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
