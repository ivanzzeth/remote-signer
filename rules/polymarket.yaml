      description: "USDC.e approval for CTF Exchange"

  # USDC.e Approve to NegRiskAdapter
  - name: "Polymarket USDC Approve NegRiskAdapter"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Allow USDC.e approval to NegRiskAdapter (via Safe)"
    config:
      functions: |
        // USDC.e on Polygon: 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174
        function approve(address spender, uint256 amount) external {
            // NegRiskAdapter
            require(
                spender == 0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296,
                "spender must be NegRiskAdapter"
            );
        }
      description: "USDC.e approval for NegRiskAdapter"

  # USDC.e Approve to NegRiskExchange
  - name: "Polymarket USDC Approve NegRiskExchange"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Allow USDC.e approval to NegRiskExchange (via Safe)"
    config:
      functions: |
        // USDC.e on Polygon: 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174
        function approve(address spender, uint256 amount) external {
            // NegRiskExchange
            require(
                spender == 0xC5d563A36AE78145C45a50134d48A1215220f80a,
                "spender must be NegRiskExchange"
