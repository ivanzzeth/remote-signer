        // ConditionalTokens on Polygon: 0x4D97DCd97eC945f40cF65F87097ACe5EA0476045
        function setApprovalForAll(address operator, bool approved) external {
            // CTF Exchange
            require(
                operator == 0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E,
