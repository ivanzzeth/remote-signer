    config:
      functions: |
        // USDC.e on Polygon: 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174
        function transfer(address recipient, uint256 amount) external {
            // Treasury wallet address
            require(
                recipient == 0x9ce3316b865e940227ea724afdeaaa2759f1aa7c,
                "recipient must be Treasury"
            );
        }
      description: "USDC.e transfer to Treasury (fund collection)"

  # Transfer USDC to Treasury
  - name: "Polymarket USDC to Treasury"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Allow USDC transfers to Treasury wallet"
    config:
      functions: |
        // USDC (native) on Polygon: 0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359
        function transfer(address recipient, uint256 amount) external {
            // Treasury wallet address
            require(
                recipient == 0x9ce3316b865e940227ea724afdeaaa2759f1aa7c,
                "recipient must be Treasury"
            );
        }
      description: "USDC transfer to Treasury (fund collection)"

  # Transfer USDC.e to Safe wallet
  - name: "Polymarket USDC.e to Safe"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Allow USDC.e transfers to user's Safe wallet"
    config:
      functions: |
        // USDC.e on Polygon: 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174
        function transfer(address recipient, uint256 amount) external {
            // recipient should be a Safe wallet - validated externally via signer_address scope
            // This rule should be scoped to specific Safe addresses via rule configuration
        }
      description: "USDC.e transfer to Safe wallet for trading"

  # ===========================================================================
  # SAFE WALLET INTERNAL TRANSACTION RULES - USDC APPROVALS
  # ===========================================================================

  # USDC.e Approve to CTF Exchange
  - name: "Polymarket USDC Approve Exchange"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Allow USDC.e approval to CTF Exchange (via Safe)"
