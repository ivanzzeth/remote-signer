        function redeemPositions(
            bytes32 conditionId,
            uint256[] calldata amounts
        ) external {
            // No additional validation - conditionId is dynamic per market
            // Requires CTF -> NegRiskAdapter approval to be set
        }
      description: "Redeem NegRisk market positions for USDC.e"
