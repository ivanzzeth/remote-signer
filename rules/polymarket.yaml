  # NegRiskAdapter Redeem Positions
  - name: "Polymarket NegRiskAdapter Redeem"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Allow NegRisk market position redemption (via Safe)"
    config:
