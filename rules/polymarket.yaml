      description: "CTF ERC1155 approval for Exchange"

  # CTF setApprovalForAll to NegRiskAdapter
  - name: "Polymarket CTF Approve NegRiskAdapter"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Allow CTF (ERC1155) approval to NegRiskAdapter (via Safe)"
