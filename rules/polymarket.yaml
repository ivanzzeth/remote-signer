    description: "Allow CTF (ERC1155) approval to NegRiskExchange (via Safe)"
    config:
      functions: |
        // ConditionalTokens on Polygon: 0x4D97DCd97eC945f40cF65F87097ACe5EA0476045
        function setApprovalForAll(address operator, bool approved) external {
            // NegRiskExchange
            require(
                operator == 0xC5d563A36AE78145C45a50134d48A1215220f80a,
