        function splitPosition(
            address collateralToken,
            bytes32 parentCollectionId,
            bytes32 conditionId,
            uint256[] calldata partition,
            uint256 amount
        ) external {
            // Collateral must be USDC.e
            require(
                collateralToken == 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174,
                "collateral must be USDC.e"
            );
            // parentCollectionId must be zero for root positions
            require(
                parentCollectionId == bytes32(0),
                "parent must be zero"
            );
        }
      description: "Split USDC.e into conditional tokens"

  # CTF Merge Positions
  - name: "Polymarket CTF Merge Positions"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Allow CTF position merging (via Safe)"
    config:
      functions: |
        // ConditionalTokens on Polygon: 0x4D97DCd97eC945f40cF65F87097ACe5EA0476045
        function mergePositions(
            address collateralToken,
            bytes32 parentCollectionId,
            bytes32 conditionId,
