      description: "CTF ERC1155 approval for NegRiskExchange"

  # ===========================================================================
  # SAFE WALLET INTERNAL TRANSACTION RULES - CTF OPERATIONS
  # ===========================================================================

  # CTF Split Position
  - name: "Polymarket CTF Split Position"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Allow CTF position splitting (via Safe)"
