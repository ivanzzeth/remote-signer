      description: "USDC.e approval for NegRiskExchange"

  # ===========================================================================
  # SAFE WALLET INTERNAL TRANSACTION RULES - CTF APPROVALS
  # ===========================================================================

  # CTF setApprovalForAll to Exchange
  - name: "Polymarket CTF Approve Exchange"
