  # Transfer USDC.e to Safe wallet
  # [SECURITY WARNING] This rule is DISABLED because the recipient (Safe wallet address)
  # is dynamic per user and cannot be hardcoded. Allowing transfer to any non-zero address
  # is a fund safety risk. Enable only after adding recipient whitelist.
  - name: "Polymarket USDC.e to Safe"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: false
    chain_id: "137"
    description: "[DISABLED - recipient not restricted] Allow USDC.e transfers to user's Safe wallet"
    config:
      functions: |
        // USDC.e on Polygon: 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174
        function transfer(address recipient, uint256 amount) external {
            // [VULN-01] Validate target contract is USDC.e
            require(
                txTo == 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174,
                "target must be USDC.e"
            );
            // [SECURITY WARNING] recipient is not restricted — cannot hardcode Safe address
            // This allows USDC.e transfer to ANY non-zero address
            require(recipient != address(0), "recipient must not be zero");
        }
      description: "USDC.e transfer to Safe wallet for trading"
      test_cases:
        - name: "should pass transfer to Safe wallet"
          input:
            to: "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"
