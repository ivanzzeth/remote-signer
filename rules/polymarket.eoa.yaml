# Polymarket Protocol Rules
# This file contains signing rules for Polymarket protocol
#
# Protocol: Polymarket (Prediction Market on Polygon)
# Chain: Polygon (137)
#
# Overview:
# - EIP-712 ClobAuth: Login authentication for CLOB API key
# - EIP-712 Order: CTF Exchange order signing
# - EIP-712 CreateProxy: Safe wallet creation signature
# - EIP-712 SafeTx: Safe wallet transaction signing
# - Direct Transactions: Safe wallet creation, execution, token transfers
#
# ===========================================================================
# CONTRACT ADDRESSES (Polygon - Chain ID: 137)
# ===========================================================================
#
# Tokens:
#   USDC.e (Bridged):        0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174
#   USDC (Native):           0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359
#
# Protocol Contracts:
#   CTF Exchange:            0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E
#   NegRiskAdapter:          0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296
#   NegRiskExchange:         0xC5d563A36AE78145C45a50134d48A1215220f80a
#   ConditionalTokens (CTF): 0x4D97DCd97eC945f40cF65F87097ACe5EA0476045
#
# Safe Contracts:
#   Safe Proxy Factory:      0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b
#
# DEX Contracts:
#   UniswapV3 Router:        0xE592427A0AEce92De3Edee1F18E0157C05861564
#
# External Wallets:
#   Treasury Wallet:         0x9Ce3316B865e940227EA724AFdeAAA2759f1AA7C  # Fund distribution & collection
#
# EIP-712 Domains:
#   ClobAuth Domain:         "ClobAuthDomain" (version: "1")
#   CTF Exchange Domain:     "Polymarket CTF Exchange" (version: "1")
#   Safe Factory Domain:     "Polymarket Contract Proxy Factory" (no version)
#
# ===========================================================================

rules:
  # ===========================================================================
  # EIP-712 CLOB AUTH RULES (Login for API Key)
  # ===========================================================================

  # Login signature for Polymarket CLOB API key
  - name: "Polymarket CLOB Auth Signature"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Validate ClobAuth signatures for Polymarket API key authentication"
    config:
      typed_data_struct: |
        struct ClobAuth {
            address address_;  // underscore suffix to escape Solidity reserved keyword, maps to message key "address"
            string timestamp;
            uint256 nonce;
            string message;
        }
      typed_data_expression: |
        // Domain validation for ClobAuth
        require(
          keccak256(bytes(eip712_domainName)) == keccak256(bytes("ClobAuthDomain")),
          "invalid domain name"
        );
        require(
          keccak256(bytes(eip712_domainVersion)) == keccak256(bytes("1")),
          "invalid domain version"
        );
        // [VULN-07] Chain ID validation — prevent cross-chain replay
        require(eip712_domainChainId == 137, "must be on Polygon");

        // Message validation via struct instance
        require(
          keccak256(bytes(clobAuth.message)) == keccak256(bytes("This message attests that I control the given wallet")),
          "invalid attestation message"
        );
      sign_type_filter: "typed_data"
      description: "ClobAuth login signature with domain and message validation"
      test_cases:
        - name: "should pass valid ClobAuth"
          input:
            typed_data:
              primaryType: "ClobAuth"
              domain:
                name: "ClobAuthDomain"
                version: "1"
                chainId: "137"
              message:
                address: "0x1234567890123456789012345678901234567890"
                timestamp: "1704067200"
                nonce: "12345"
                message: "This message attests that I control the given wallet"
          expect_pass: true
        - name: "should reject invalid domain"
          input:
            typed_data:
              primaryType: "ClobAuth"
              domain:
                name: "WrongDomain"
                version: "1"
                chainId: "137"
              message:
                address: "0x1234567890123456789012345678901234567890"
                timestamp: "1704067200"
                nonce: "12345"
                message: "This message attests that I control the given wallet"
          expect_pass: false
          expect_reason: "invalid domain name"
        - name: "should reject wrong chainId"
          input:
            typed_data:
              primaryType: "ClobAuth"
              domain:
                name: "ClobAuthDomain"
                version: "1"
                chainId: "56"
              message:
                address: "0x1234567890123456789012345678901234567890"
                timestamp: "1704067200"
                nonce: "12345"
                message: "This message attests that I control the given wallet"
          expect_pass: false
          expect_reason: "must be on Polygon"

  # ===========================================================================
  # EIP-712 ORDER SIGNING RULES (CTF Exchange)
  # ===========================================================================

  # Order signing for Polymarket CTF Exchange
  - name: "Polymarket Order Signature"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Validate Polymarket CTF Exchange order signatures"
    config:
      typed_data_struct: |
        struct Order {
            uint256 salt;
            address maker;
            address signer;
            address taker;
            uint256 tokenId;
            uint256 makerAmount;
            uint256 takerAmount;
            uint256 expiration;
            uint256 nonce;
            uint256 feeRateBps;
            uint8 side;
            uint8 signatureType;
        }
      typed_data_expression: |
        // Domain validation
        require(
          keccak256(bytes(eip712_domainName)) == keccak256(bytes("Polymarket CTF Exchange")),
          "invalid domain name"
        );
        require(
          keccak256(bytes(eip712_domainVersion)) == keccak256(bytes("1")),
          "invalid domain version"
        );
        // [VULN-05] Verify the contract address to prevent fake exchange attacks
        require(
          eip712_domainContract == 0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E,
          "invalid verifying contract"
        );

        // Order validation via struct instance
        // taker must be zero address for public orders (anyone can fill)
        require(order.taker == address(0), "taker must be zero address");

        // [VULN-10] Signer identity validation — order.signer must match the actual signing key
        require(order.signer == ctx_signer, "order signer must match signing key");

        // Fee validation: max 10% (1000 basis points)
        require(order.feeRateBps <= 1000, "fee exceeds 10%");
      sign_type_filter: "typed_data"
      description: "CTF Exchange order signing with fee limits and zero taker"
      test_cases:
        - name: "should pass valid order with zero taker"
          input:
            typed_data:
              primaryType: "Order"
              domain:
                name: "Polymarket CTF Exchange"
                version: "1"
                chainId: "137"
                verifyingContract: "0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E"
              message:
                salt: "12345"
                maker: "0x1234567890123456789012345678901234567890"
                signer: "0x1234567890123456789012345678901234567890"
                taker: "0x0000000000000000000000000000000000000000"
                tokenId: "1"
                makerAmount: "1000000000000000000"
                takerAmount: "1000000000000000000"
                expiration: "1893456000"
                nonce: "0"
                feeRateBps: "100"
                side: "0"
                signatureType: "0"
            signer: "0x1234567890123456789012345678901234567890"
          expect_pass: true
        - name: "should reject non-zero taker"
          input:
            typed_data:
              primaryType: "Order"
              domain:
                name: "Polymarket CTF Exchange"
                version: "1"
                chainId: "137"
                verifyingContract: "0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E"
              message:
                salt: "12345"
                maker: "0x1234567890123456789012345678901234567890"
                signer: "0x1234567890123456789012345678901234567890"
                taker: "0x1111111111111111111111111111111111111111"
                tokenId: "1"
                makerAmount: "1000000000000000000"
                takerAmount: "1000000000000000000"
                expiration: "1893456000"
                nonce: "0"
                feeRateBps: "100"
                side: "0"
                signatureType: "0"
            signer: "0x1234567890123456789012345678901234567890"
          expect_pass: false
          expect_reason: "taker must be zero address"
        - name: "should reject wrong verifying contract"
          input:
            typed_data:
              primaryType: "Order"
              domain:
                name: "Polymarket CTF Exchange"
                version: "1"
                chainId: "137"
                verifyingContract: "0xDEADDEADDEADDEADDEADDEADDEADDEADDEADDEAD"
              message:
                salt: "12345"
                maker: "0x1234567890123456789012345678901234567890"
                signer: "0x1234567890123456789012345678901234567890"
                taker: "0x0000000000000000000000000000000000000000"
                tokenId: "1"
                makerAmount: "1000000000000000000"
                takerAmount: "1000000000000000000"
                expiration: "1893456000"
                nonce: "0"
                feeRateBps: "100"
                side: "0"
                signatureType: "0"
            signer: "0x1234567890123456789012345678901234567890"
          expect_pass: false
          expect_reason: "invalid verifying contract"

  # ===========================================================================
  # EIP-712 CREATE PROXY RULES (Safe Wallet Creation)
  # ===========================================================================

  # Safe wallet creation signature for Polymarket
  - name: "Polymarket Safe Wallet Creation Signature"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Validate Safe wallet creation signature for Polymarket"
    config:
      typed_data_struct: |
        struct CreateProxy {
            address paymentToken;
            uint256 payment;
            address paymentReceiver;
        }
      typed_data_expression: |
        // Domain validation for Safe Factory
        require(
          keccak256(bytes(eip712_domainName)) == keccak256(bytes("Polymarket Contract Proxy Factory")),
          "invalid domain name"
        );
        // Note: No version field in Polymarket Safe Factory domain
        require(eip712_domainChainId == 137, "must be on Polygon");
        // [SECURITY] verifyingContract must be Safe Proxy Factory
        require(
          eip712_domainContract == 0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b,
          "verifyingContract must be Safe Factory"
        );

        // CreateProxy validation via struct instance - should be zero payment (free creation)
        require(createProxy.paymentToken == address(0), "payment token must be zero");
        require(createProxy.payment == 0, "payment must be zero");
        require(createProxy.paymentReceiver == address(0), "payment receiver must be zero");
      sign_type_filter: "typed_data"
      description: "Safe wallet creation with zero payment"
      test_cases:
        - name: "should pass valid CreateProxy with zero payment"
          input:
            typed_data:
              primaryType: "CreateProxy"
              domain:
                name: "Polymarket Contract Proxy Factory"
                chainId: "137"
                verifyingContract: "0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b"
              message:
                paymentToken: "0x0000000000000000000000000000000000000000"
                payment: "0"
                paymentReceiver: "0x0000000000000000000000000000000000000000"
          expect_pass: true
        - name: "should reject non-zero payment"
          input:
            typed_data:
              primaryType: "CreateProxy"
              domain:
                name: "Polymarket Contract Proxy Factory"
                chainId: "137"
                verifyingContract: "0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b"
              message:
                paymentToken: "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"
                payment: "1000000"
                paymentReceiver: "0x1234567890123456789012345678901234567890"
          expect_pass: false
          expect_reason: "payment token must be zero"

  # ===========================================================================
  # EIP-712 SAFE TX SIGNING RULES
  # ===========================================================================

  # Safe transaction signing for Polymarket
  - name: "Polymarket SafeTx Signature"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Validate Safe wallet transaction signatures on Polygon"
    config:
      typed_data_struct: |
        struct SafeTx {
            address to;
            uint256 value;
            bytes data;
            uint8 operation;
            uint256 safeTxGas;
            uint256 baseGas;
            uint256 gasPrice;
            address gasToken;
            address refundReceiver;
            uint256 nonce;
        }
      typed_data_expression: |
        // Domain validation for Safe on Polygon
        require(eip712_domainChainId == 137, "SafeTx must be on Polygon");
        // [SECURITY] verifyingContract must be non-zero (Safe address varies per user in EOA mode)
        require(eip712_domainContract != address(0), "verifyingContract required");

        // Value must be 0 for token operations (no native token transfer)
        require(safeTx.value == 0, "ETH value must be zero");

        // [VULN-11] Only CALL operations allowed — block DELEGATECALL
        require(safeTx.operation == 0, "only CALL operations allowed");

        // [VULN-12] Gas manipulation protection
        require(safeTx.gasPrice == 0, "gasPrice must be zero");
        require(safeTx.gasToken == address(0), "gasToken must be zero");
        require(safeTx.refundReceiver == address(0), "refundReceiver must be zero");

        // [SECURITY] Validate internal call data — restrict target contracts and methods
        bytes memory data = safeTx.data;
        // Data must not be empty - all Safe transactions must have valid internal operations
        require(data.length > 0, "data must not be empty");
        require(data.length >= 4, "data too short for function selector");

        // Define function selectors
        bytes4 APPROVE_SELECTOR = bytes4(keccak256("approve(address,uint256)"));
        bytes4 SET_APPROVAL_FOR_ALL_SELECTOR = bytes4(keccak256("setApprovalForAll(address,bool)"));
        bytes4 SPLIT_POSITION_SELECTOR = bytes4(keccak256("splitPosition(address,bytes32,bytes32,uint256[],uint256)"));
        bytes4 MERGE_POSITIONS_SELECTOR = bytes4(keccak256("mergePositions(address,bytes32,bytes32,uint256[],uint256)"));
        bytes4 REDEEM_POSITIONS_SELECTOR = bytes4(keccak256("redeemPositions(address,bytes32,bytes32,uint256[])"));
        bytes4 NEGRISK_SPLIT_SELECTOR = bytes4(keccak256("splitPosition(bytes32,uint256)"));
        bytes4 NEGRISK_MERGE_SELECTOR = bytes4(keccak256("mergePositions(bytes32,uint256)"));
        bytes4 NEGRISK_REDEEM_SELECTOR = bytes4(keccak256("redeemPositions(bytes32,uint256[])"));

        // Extract function selector
        bytes4 selector = bytes4(data[0]) | (bytes4(data[1]) >> 8) | (bytes4(data[2]) >> 16) | (bytes4(data[3]) >> 24);

        // USDC.e operations
        if (safeTx.to == 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174) {
            require(selector == APPROVE_SELECTOR, "unsupported USDC.e operation");
            require(data.length >= 68, "invalid approve data length");
            bytes memory params = new bytes(data.length - 4);
            for (uint256 i = 0; i < params.length; i++) {
                params[i] = data[i + 4];
            }
            (address spender, ) = abi.decode(params, (address, uint256));
            require(
                spender == 0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E || // CTF Exchange
                spender == 0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296 || // NegRiskAdapter
                spender == 0xC5d563A36AE78145C45a50134d48A1215220f80a,   // NegRiskExchange
                "spender must be allowed protocol contract"
            );
        }
        // CTF operations
        else if (safeTx.to == 0x4D97DCd97eC945f40cF65F87097ACe5EA0476045) {
            require(
                selector == SET_APPROVAL_FOR_ALL_SELECTOR ||
                selector == SPLIT_POSITION_SELECTOR ||
                selector == MERGE_POSITIONS_SELECTOR ||
                selector == REDEEM_POSITIONS_SELECTOR,
                "unsupported CTF operation"
            );
            if (selector == SET_APPROVAL_FOR_ALL_SELECTOR) {
                require(data.length >= 68, "invalid setApprovalForAll data length");
                bytes memory params = new bytes(data.length - 4);
                for (uint256 i = 0; i < params.length; i++) {
                    params[i] = data[i + 4];
                }
                (address operator, bool approved) = abi.decode(params, (address, bool));
                require(approved, "approval must be true");
                require(
                    operator == 0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E || // CTF Exchange
                    operator == 0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296 || // NegRiskAdapter
                    operator == 0xC5d563A36AE78145C45a50134d48A1215220f80a,   // NegRiskExchange
                    "operator must be allowed protocol contract"
                );
            } else if (selector == SPLIT_POSITION_SELECTOR || selector == MERGE_POSITIONS_SELECTOR) {
                require(data.length >= 164, "invalid split/merge data length");
                bytes memory params = new bytes(data.length - 4);
                for (uint256 i = 0; i < params.length; i++) {
                    params[i] = data[i + 4];
                }
                (address collateralToken, bytes32 parentCollectionId, , , ) = abi.decode(params, (address, bytes32, bytes32, uint256[], uint256));
                require(collateralToken == 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174, "collateral must be USDC.e");
                require(parentCollectionId == bytes32(0), "parent must be zero");
            } else if (selector == REDEEM_POSITIONS_SELECTOR) {
                require(data.length >= 132, "invalid redeem data length");
                bytes memory params = new bytes(data.length - 4);
                for (uint256 i = 0; i < params.length; i++) {
                    params[i] = data[i + 4];
                }
                (address collateralToken, bytes32 parentCollectionId, , ) = abi.decode(params, (address, bytes32, bytes32, uint256[]));
                require(collateralToken == 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174, "collateral must be USDC.e");
                require(parentCollectionId == bytes32(0), "parent must be zero");
            }
        }
        // NegRiskAdapter operations
        else if (safeTx.to == 0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296) {
            if (selector == NEGRISK_SPLIT_SELECTOR || selector == NEGRISK_MERGE_SELECTOR || selector == NEGRISK_REDEEM_SELECTOR) {
                // 2-param simplified variants — contract handles collateral internally
            } else if (selector == SPLIT_POSITION_SELECTOR || selector == MERGE_POSITIONS_SELECTOR) {
                // 5-param CTF-compatible variants — validate collateral and parent
                require(data.length >= 164, "invalid NegRisk 5-param data length");
                bytes memory nrParams = new bytes(data.length - 4);
                for (uint256 i = 0; i < nrParams.length; i++) {
                    nrParams[i] = data[i + 4];
                }
                (address nrCollateral, bytes32 nrParent, , , ) = abi.decode(nrParams, (address, bytes32, bytes32, uint256[], uint256));
                require(nrCollateral == 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174, "NegRisk collateral must be USDC.e");
                require(nrParent == bytes32(0), "NegRisk parent must be zero");
            } else {
                revert("unsupported NegRiskAdapter operation");
            }
        }
        else {
            revert("unsupported target contract");
        }
      sign_type_filter: "typed_data"
      description: "Safe transaction signing with full internal call validation"
      test_cases:
        - name: "should pass SafeTx with USDC.e approve to Exchange"
          input:
            typed_data:
              primaryType: "SafeTx"
              domain:
                chainId: "137"
                verifyingContract: "0x1234567890123456789012345678901234567890"
              message:
                to: "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"
                value: "0"
                data: "0x095ea7b30000000000000000000000004bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982Effffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
                operation: "0"
                safeTxGas: "0"
                baseGas: "0"
                gasPrice: "0"
                gasToken: "0x0000000000000000000000000000000000000000"
                refundReceiver: "0x0000000000000000000000000000000000000000"
                nonce: "0"
          expect_pass: true
        # ---------------------------------------------------------------
        # Real transaction test case: redeemPositions via CTF
        # Source: Polygon tx 0x714b3d1f22b043eeeb09b1a65833777c4ac17f4044a04e635c686e8d397d8eb1
        # This is the SafeTx typed_data signed before the execTransaction.
        # CTF.redeemPositions(USDC.e, 0x0, conditionId, [1,2])
        # ---------------------------------------------------------------
        - name: "should pass SafeTx with CTF redeemPositions (real tx 0x714b3d)"
          input:
            typed_data:
              primaryType: "SafeTx"
              domain:
                chainId: "137"
                verifyingContract: "0xaC52BebecA7f5FA1561fa9Ab8DA136602D21b837"
              message:
                to: "0x4D97DCd97eC945f40cF65F87097ACe5EA0476045"
                value: "0"
                # redeemPositions(address,bytes32,bytes32,uint256[])
                # collateralToken=USDC.e, parentCollectionId=0x0, conditionId=0xbd42fb9a..., indexSets=[1,2]
                data: ""
                operation: "0"
                safeTxGas: "217890"
                baseGas: "0"
                gasPrice: "0"
                gasToken: "0x0000000000000000000000000000000000000000"
                refundReceiver: "0x0000000000000000000000000000000000000000"
                nonce: "0"
            signer: "0x88eD75e9eCE373997221E3c0229e74007C1AD718"
          expect_pass: true
        # ---------------------------------------------------------------
        # Real transaction test cases: USDC.e approve to 3 spenders
        # Source: Polygon txs from 0x7862873f... → Safe 0xbd400c71...
        # tx1: 0xfc9db476 approve(CTF Exchange, max)
        # tx2: 0x290cdcc9 approve(NegRiskAdapter, max)
        # tx3: 0x278f1e71 approve(NegRiskExchange, max)
        # ---------------------------------------------------------------
        - name: "should pass SafeTx with USDC.e approve to CTF Exchange (real tx 0xfc9db476)"
          input:
            typed_data:
              primaryType: "SafeTx"
              domain:
                chainId: "137"
                verifyingContract: "0xbd400c71c83538d1adAc3F635CF60A6FF24A03d6"
              message:
                to: "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"
                value: "0"
                data: "0x095ea7b30000000000000000000000004bfb41d5b3570defd03c39a9a4d8de6bd8b8982effffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
                operation: "0"
                safeTxGas: "122295"
                baseGas: "0"
                gasPrice: "0"
                gasToken: "0x0000000000000000000000000000000000000000"
                refundReceiver: "0x0000000000000000000000000000000000000000"
                nonce: "0"
          expect_pass: true
        - name: "should pass SafeTx with USDC.e approve to NegRiskAdapter (real tx 0x290cdcc9)"
          input:
            typed_data:
              primaryType: "SafeTx"
              domain:
                chainId: "137"
                verifyingContract: "0xbd400c71c83538d1adAc3F635CF60A6FF24A03d6"
              message:
                to: "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"
                value: "0"
                data: "0x095ea7b3000000000000000000000000d91e80cf2e7be2e162c6513ced06f1dd0da35296ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
                operation: "0"
                safeTxGas: "122295"
                baseGas: "0"
                gasPrice: "0"
                gasToken: "0x0000000000000000000000000000000000000000"
                refundReceiver: "0x0000000000000000000000000000000000000000"
                nonce: "0"
          expect_pass: true
        - name: "should pass SafeTx with USDC.e approve to NegRiskExchange (real tx 0x278f1e71)"
          input:
            typed_data:
              primaryType: "SafeTx"
              domain:
                chainId: "137"
                verifyingContract: "0xbd400c71c83538d1adAc3F635CF60A6FF24A03d6"
              message:
                to: "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"
                value: "0"
                data: "0x095ea7b3000000000000000000000000c5d563a36ae78145c45a50134d48a1215220f80affffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff"
                operation: "0"
                safeTxGas: "122295"
                baseGas: "0"
                gasPrice: "0"
                gasToken: "0x0000000000000000000000000000000000000000"
                refundReceiver: "0x0000000000000000000000000000000000000000"
                nonce: "0"
          expect_pass: true
        # ---------------------------------------------------------------
        # Real transaction test cases: CTF setApprovalForAll to 3 operators
        # tx4: 0x4f1356ad setApprovalForAll(CTF Exchange, true)
        # tx5: 0x80b5400f setApprovalForAll(NegRiskAdapter, true)
        # tx6: 0xbdbb5a46 setApprovalForAll(NegRiskExchange, true)
