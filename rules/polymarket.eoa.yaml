  # ===========================================================================
  # ETHEREUM TRANSACTION RULES - SAFE WALLET OPERATIONS
  # ===========================================================================

  # Safe Proxy Factory - Create new Safe wallet
  - name: "Polymarket Safe Wallet Creation"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Allow Safe wallet creation on Polymarket Safe Factory"
    config:
      functions: |
        // Polymarket Safe Proxy Factory on Polygon
        // Contract: 0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b
        // Signature struct for EIP-712 signature (v, r, s)
        struct Signature {
            uint8 v;
            bytes32 r;
            bytes32 s;
        }

        // Function selector: 0xa1884d2c
        function createProxy(
            address paymentToken,
            uint256 payment,
            address paymentReceiver,
            Signature memory createSig
        ) external {
            // [VULN-01] Validate target contract is Safe Proxy Factory
            require(
                txTo == 0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b,
                "target must be Safe Factory"
            );
            // Payment should be zero (free creation)
            require(paymentToken == address(0), "payment token must be zero");
            require(payment == 0, "payment must be zero");
            require(paymentReceiver == address(0), "payment receiver must be zero");
        }
      description: "Safe wallet creation with zero payment"
      test_cases:
        - name: "should pass with zero payment"
          input:
            to: "0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b"
            # createProxy(paymentToken=0x0, payment=0, paymentReceiver=0x0, sig=(0,0x0,0x0))
            data: ""
          expect_pass: true
        # ---------------------------------------------------------------
        # Real transaction test case: createProxy on Polymarket Safe Factory
        # Source: Polygon tx 0xe0d031b8d03bf8c98e7692ead95f70a422ed3e183dd7fba8db5746b97d34e288
        # from: 0x7862873f2f2E0d7903a98B78dCd9163975c7053c
        # to: 0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b (Polymarket Safe Factory)
        # createProxy(paymentToken=0x0, payment=0, paymentReceiver=0x0, sig=(27,r,s))
        # ---------------------------------------------------------------
        - name: "should pass createProxy with zero payment (real tx 0xe0d031b8)"
          input:
            to: "0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b"
            data: ""
          expect_pass: true
        - name: "should reject with non-zero payment token"
          input:
            to: "0xaacFeEa03eb1561C4e67d661e40682Bd20E3541b"
            # createProxy(paymentToken=USDC.e, payment=1, paymentReceiver=0x1234..., sig=(27,r,s))
            data: ""
          expect_pass: false
          expect_reason: "payment token must be zero"
        - name: "should reject wrong target contract"
          input:
            to: "0xDEADDEADDEADDEADDEADDEADDEADDEADDEADDEAD"
            # createProxy on fake contract
            data: ""
          expect_pass: false
          expect_reason: "target must be Safe Factory"

  # Safe execTransaction - Execute through Safe wallet
  # [SECURITY] Validates both Safe-level params AND internal call target/method/params
  - name: "Polymarket Safe Execute Transaction"
    type: "evm_solidity_expression"
    mode: "whitelist"
    enabled: true
    chain_id: "137"
    description: "Allow Safe wallet execTransaction with internal call validation"
    config:
      functions: |
        // Note: txTo is not hardcoded because Safe wallet address varies per user in EOA mode
        function execTransaction(
            address to,
            uint256 value,
            bytes calldata data,
            uint8 operation,
            uint256 safeTxGas,
            uint256 baseGas,
            uint256 gasPrice,
            address gasToken,
            address refundReceiver,
            bytes memory signatures
        ) external {
            // Value must be zero (no native token transfer)
            require(value == 0, "value must be zero");
            // [VULN-11] Only CALL operations allowed — block DELEGATECALL
            require(operation == 0, "only CALL allowed");
            // [VULN-12] Gas manipulation protection
            require(gasPrice == 0, "gasPrice must be zero");
            require(gasToken == address(0), "gasToken must be zero");
            require(refundReceiver == address(0), "refundReceiver must be zero");

            // [SECURITY] Validate internal call — restrict target, method, and params
            if (data.length == 0) {
                return;
            }

            // Pure Solidity parameter decoding — no assembly, uses abi.decode on calldata slices

            // USDC.e operations
            if (to == 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174) {
                require(data.length >= 4, "invalid data length");
                bytes4 selector = bytes4(data);
                bytes4 APPROVE_SELECTOR = bytes4(keccak256("approve(address,uint256)"));
                if (selector == APPROVE_SELECTOR) {
                    require(data.length >= 68, "invalid approve data length");
                    (address spender, ) = abi.decode(data[4:], (address, uint256));
                    require(
                        spender == 0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E || // CTF Exchange
                        spender == 0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296 || // NegRiskAdapter
                        spender == 0xC5d563A36AE78145C45a50134d48A1215220f80a,   // NegRiskExchange
                        "spender must be allowed protocol contract"
                    );
                    return;
                }
                revert("unsupported USDC.e operation");
            }

            // CTF operations
            if (to == 0x4D97DCd97eC945f40cF65F87097ACe5EA0476045) {
                require(data.length >= 4, "invalid data length");
                bytes4 selector = bytes4(data);
                bytes4 SET_APPROVAL_FOR_ALL_SELECTOR = bytes4(keccak256("setApprovalForAll(address,bool)"));
                bytes4 SPLIT_POSITION_SELECTOR = bytes4(keccak256("splitPosition(address,bytes32,bytes32,uint256[],uint256)"));
                bytes4 MERGE_POSITIONS_SELECTOR = bytes4(keccak256("mergePositions(address,bytes32,bytes32,uint256[],uint256)"));
                bytes4 REDEEM_POSITIONS_SELECTOR = bytes4(keccak256("redeemPositions(address,bytes32,bytes32,uint256[])"));

                if (selector == SET_APPROVAL_FOR_ALL_SELECTOR) {
                    require(data.length >= 68, "invalid setApprovalForAll data length");
                    (address operator, bool approved) = abi.decode(data[4:], (address, bool));
                    require(approved, "approval must be true");
                    require(
                        operator == 0x4bFb41d5B3570DeFd03C39a9A4D8dE6Bd8B8982E || // CTF Exchange
                        operator == 0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296 || // NegRiskAdapter
                        operator == 0xC5d563A36AE78145C45a50134d48A1215220f80a,   // NegRiskExchange
                        "operator must be allowed protocol contract"
                    );
                    return;
                }

                if (selector == SPLIT_POSITION_SELECTOR || selector == MERGE_POSITIONS_SELECTOR) {
                    require(data.length >= 164, "invalid split/merge data length");
                    (address collateralToken, bytes32 parentCollectionId, , , ) = abi.decode(data[4:], (address, bytes32, bytes32, uint256[], uint256));
                    require(collateralToken == 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174, "collateral must be USDC.e");
                    require(parentCollectionId == bytes32(0), "parent must be zero");
                    return;
                }

                if (selector == REDEEM_POSITIONS_SELECTOR) {
                    require(data.length >= 132, "invalid redeem data length");
                    (address collateralToken, bytes32 parentCollectionId, , ) = abi.decode(data[4:], (address, bytes32, bytes32, uint256[]));
                    require(collateralToken == 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174, "collateral must be USDC.e");
                    require(parentCollectionId == bytes32(0), "parent must be zero");
                    return;
                }

                revert("unsupported CTF operation");
            }

            // NegRiskAdapter operations
            if (to == 0xd91E80cF2E7be2e162c6513ceD06f1dD0dA35296) {
                require(data.length >= 4, "invalid data length");
                bytes4 selector = bytes4(data);
                bytes4 NEGRISK_SPLIT_SELECTOR = bytes4(keccak256("splitPosition(bytes32,uint256)"));
                bytes4 NEGRISK_MERGE_SELECTOR = bytes4(keccak256("mergePositions(bytes32,uint256)"));
                bytes4 NEGRISK_REDEEM_SELECTOR = bytes4(keccak256("redeemPositions(bytes32,uint256[])"));
                bytes4 SPLIT_POSITION_SELECTOR = bytes4(keccak256("splitPosition(address,bytes32,bytes32,uint256[],uint256)"));
                bytes4 MERGE_POSITIONS_SELECTOR = bytes4(keccak256("mergePositions(address,bytes32,bytes32,uint256[],uint256)"));

                if (selector == NEGRISK_SPLIT_SELECTOR || selector == NEGRISK_MERGE_SELECTOR || selector == NEGRISK_REDEEM_SELECTOR) {
                    return;
                }

                if (selector == SPLIT_POSITION_SELECTOR || selector == MERGE_POSITIONS_SELECTOR) {
                    require(data.length >= 164, "invalid NegRisk 5-param data length");
                    (address nrCollateral, bytes32 nrParent, , , ) = abi.decode(data[4:], (address, bytes32, bytes32, uint256[], uint256));
                    require(nrCollateral == 0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174, "NegRisk collateral must be USDC.e");
                    require(nrParent == bytes32(0), "NegRisk parent must be zero");
                    return;
                }

                revert("unsupported NegRiskAdapter operation");
            }

            revert("unsupported target contract");
        }
      description: "Safe execution with internal call validation"
      test_cases:
        - name: "should pass execTransaction with empty data (no-op)"
          input:
            to: "0x1234567890123456789012345678901234567890"
            # execTransaction(to=USDC.e, value=0, data=empty, operation=0, safeTxGas=0, baseGas=0, gasPrice=0, gasToken=0x0, refundReceiver=0x0, signatures=0x)
            data: ""
          expect_pass: true
        # ---------------------------------------------------------------
        # Real transaction test case: execTransaction with CTF redeemPositions
        # Source: Polygon tx 0x714b3d1f22b043eeeb09b1a65833777c4ac17f4044a04e635c686e8d397d8eb1
        # from: 0x88eD75e9eCE373997221E3c0229e74007C1AD718
        # to: 0xaC52BebecA7f5FA1561fa9Ab8DA136602D21b837 (Safe wallet)
        # execTransaction(CTF, 0, redeemPositions(USDC.e,0x0,conditionId,[1,2]), 0, 217890, 0, 0, 0x0, 0x0, sig)
        # Note: txTo is not hardcoded in EOA mode, so any Safe address works
        # ---------------------------------------------------------------
        - name: "should pass execTransaction with real CTF redeemPositions (real tx 0x714b3d)"
          input:
            to: "0xaC52BebecA7f5FA1561fa9Ab8DA136602D21b837"
            data: ""
          expect_pass: true
        # ---------------------------------------------------------------
        # Real transaction test cases: 6 approve/setApprovalForAll via execTransaction
        # Source: Polygon txs from 0x7862873f... → Safe 0xbd400c71...
        # Note: txTo is not restricted in EOA mode, using real Safe address
        # ---------------------------------------------------------------
        - name: "should pass execTransaction with USDC.e approve to CTF Exchange (real tx 0xfc9db476)"
          input:
            to: "0xbd400c71c83538d1adAc3F635CF60A6FF24A03d6"
            data: ""
          expect_pass: true
        - name: "should pass execTransaction with USDC.e approve to NegRiskAdapter (real tx 0x290cdcc9)"
          input:
            to: "0xbd400c71c83538d1adAc3F635CF60A6FF24A03d6"
            data: ""
          expect_pass: true
        - name: "should pass execTransaction with USDC.e approve to NegRiskExchange (real tx 0x278f1e71)"
          input:
            to: "0xbd400c71c83538d1adAc3F635CF60A6FF24A03d6"
            data: ""
          expect_pass: true
        - name: "should pass execTransaction with CTF setApprovalForAll to Exchange (real tx 0x4f1356ad)"
          input:
            to: "0xbd400c71c83538d1adAc3F635CF60A6FF24A03d6"
            data: ""
          expect_pass: true
        - name: "should pass execTransaction with CTF setApprovalForAll to NegRiskAdapter (real tx 0x80b5400f)"
          input:
            to: "0xbd400c71c83538d1adAc3F635CF60A6FF24A03d6"
            data: ""
          expect_pass: true
        - name: "should pass execTransaction with CTF setApprovalForAll to NegRiskExchange (real tx 0xbdbb5a46)"
          input:
            to: "0xbd400c71c83538d1adAc3F635CF60A6FF24A03d6"
            data: ""
          expect_pass: true
        - name: "should reject execTransaction with non-zero value"
          input:
            to: "0x1234567890123456789012345678901234567890"
            data: ""
          expect_pass: false
          expect_reason: "value must be zero"
        - name: "should reject execTransaction with DELEGATECALL"
          input:
            to: "0x1234567890123456789012345678901234567890"
            data: ""
          expect_pass: false
          expect_reason: "only CALL allowed"

