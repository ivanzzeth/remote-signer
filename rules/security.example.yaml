# Security rules
# Blocklist rules are evaluated first; if any blocklist matches, the request is rejected.
# Whitelist rules then determine allowed sign types.

rules:
  - id: "block-malicious-addresses"
    name: "Block malicious addresses"
    type: "evm_solidity_expression"
    mode: "blocklist"
    enabled: true
    description: "Block transfers to burn address and zero address"
    config:
      expression: |
        require(to != 0x000000000000000000000000000000000000dEaD, "blocked: burn address");
        require(to != address(0), "blocked: zero address");
      test_cases:
        - name: "should pass for normal address"
          input:
            to: "0x5B38Da6a701c568545dCfcB03FcB875f56beddC4"
          expect_pass: true
        - name: "should block burn address"
          input:
            to: "0x000000000000000000000000000000000000dEaD"
          expect_pass: false
          expect_reason: "blocked: burn address"
        - name: "should block zero address"
          input:
            to: "0x0000000000000000000000000000000000000000"
          expect_pass: false
          expect_reason: "blocked: zero address"

  - id: "allowed-signing-methods"
    name: "Allowed signing methods"
    type: "sign_type_restriction"
    mode: "whitelist"
    enabled: true
    description: "Only allow personal, typed_data, and transaction signing"
    config:
      allowed_sign_types:
        - "personal"
        - "typed_data"
        - "transaction"
