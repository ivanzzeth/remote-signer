# =============================================================================
# Local/personal deployment — reuses ~/.remote-signer as-is.
# =============================================================================
#
# Use this compose file when you want Docker's lifecycle benefits
# (restart-on-crash, auto-start on boot via the host's docker daemon)
# without migrating the operational data you already have on disk.
#
# Differences from docker-compose.yml (the production / multi-instance
# variant):
#
#   - No PostgreSQL service. The daemon uses whichever database your
#     existing ~/.remote-signer/config.yaml points at — by default the
#     SQLite file under the same dir.
#   - Bind-mounts your host's ~/.remote-signer into the container,
#     so the admin keystore, signers, API keys, audit log, and SQLite
#     DB are all the exact files you've been running against natively.
#   - Runs as your host UID:GID so the bind mount stays writable
#     without `chown -R 1000:1000 ~/.remote-signer` first.
#   - Drops the production security hardening (read-only fs, cap drops,
#     seccomp profile, IPC_LOCK) since the threat model here is
#     "one operator, one machine", not "internet-exposed service".
#
# Usage:
#   # Build the image (one-off; rebuild on Go/web changes):
#   docker compose -f docker-compose.local.yml build
#
#   # Run it. Pass UID/GID so file permissions work on bind mount.
#   UID=$(id -u) GID=$(id -g) docker compose -f docker-compose.local.yml up -d
#
#   # Logs / stop:
#   docker compose -f docker-compose.local.yml logs -f
#   docker compose -f docker-compose.local.yml down
#
# Switching between native daemon and this container:
#   - Stop the native daemon (kill PID or `launchctl unload …`).
#   - `docker compose -f docker-compose.local.yml up -d`.
#   - The container is now the daemon — same data, same port (8548),
#     plus restart-on-crash from Docker. To go back, `down` the
#     container and start the native daemon again.

services:
  remote-signer:
    # Default to pulling the latest release image from ghcr — most
    # personal-mode users don't want to wait through a Node + Go build.
    # Override with REMOTE_SIGNER_IMAGE for a pinned tag, or run
    # `docker compose -f docker-compose.local.yml build` to bake local
    # source changes against this tag instead.
    image: ${REMOTE_SIGNER_IMAGE:-ghcr.io/ivanzzeth/remote-signer:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-docker-local}
    container_name: remote-signer-local
    restart: unless-stopped

    # Run as the host user so the bind-mounted ~/.remote-signer is
    # readable/writable without chown gymnastics. Defaults are macOS
    # Homebrew-style (501); on Linux they're usually 1000 — set
    # explicitly: `UID=$(id -u) GID=$(id -g) docker compose up`.
    user: "${UID:-1000}:${GID:-1000}"

    # Host network: binds 127.0.0.1:8548 directly on the host so the
    # extension, dApps, and CLI work without --url overrides. Matches
    # the native-daemon experience.
    network_mode: host

    environment:
      # The daemon resolves config + data paths under REMOTE_SIGNER_HOME.
      # We use the host's $HOME path verbatim inside the container so
      # any absolute paths in the user's existing config.yaml (e.g.
      #   database.dsn: file:/home/ivan/.remote-signer/remote-signer.db)
      # resolve identically inside and outside the container. Otherwise
      # users hit a confusing SQLite CANTOPEN ("out of memory") as
      # modernc's wrapper surfaces the underlying ENOENT.
      REMOTE_SIGNER_HOME: ${HOME}/.remote-signer
      HOME: ${HOME}

      # Optional. When set, the daemon bootstraps the admin keystore at
      # startup using this password. When unset (default), the daemon
      # comes up "soft-started" and the web UI at http://127.0.0.1:8548
      # prompts for a password on first visit — set it interactively,
      # never see this env var. See GIT.md "First-time setup".
      REMOTE_SIGNER_KEYSTORE_PASSWORD: ${REMOTE_SIGNER_KEYSTORE_PASSWORD:-}

      # Common proxy passthrough for users behind corporate networks.
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}

    volumes:
      # Bind the host's directory to the same path inside the container.
      # Docker auto-creates the target path, so /home/<host-user>/ exists
      # in the container even though the base image only ships
      # /home/signer/. Both sides see the same absolute path → drop-in
      # for the native daemon.
      - ${HOME}/.remote-signer:${HOME}/.remote-signer

    # The Dockerfile's default CMD assumes /app/config.yaml; here we
    # let the daemon find the config the normal way (via the
    # REMOTE_SIGNER_HOME path it inherited above).
    command: ["/app/remote-signer", "server", "start"]

    healthcheck:
      test: ["CMD-SHELL", "wget --no-hsts -qO /dev/null http://localhost:8548/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
